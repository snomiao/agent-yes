[default]
# Exclude modules that depend on PTY, OS integration, or networking
exclude-files = [
  "src/main.rs",
  "src/context.rs",
  "src/pty_spawner.rs",
  "src/vterm.rs",
  "src/logger.rs",
  "src/swarm/*",
  "src/swarm.rs",
  # FIFO IPC: mkfifo + a spawned OS reader thread; tarpaulin's ptrace
  # can't trace into the thread's read loop. Unit tests in src/fifo.rs
  # still run for correctness, they just don't contribute to coverage.
  "src/fifo.rs",
]
# Run with all features disabled (swarm requires libp2p build)
run-types = ["Tests"]
timeout = "120s"
# Avoid tarpaulin signal handling crash with PTY tests
implicit-test-threads = true
