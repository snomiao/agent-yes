name: Release

on:
  push:
    branches:
      - main
      - beta

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for trusted publishing and npm provenance
      actions: write # to trigger rust-build workflow
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # semantic-release needs full history to compute versions correctly
      - uses: actions/setup-node@v5
        with:
          node-version: "latest"
          registry-url: "https://registry.npmjs.org"
      - uses: oven-sh/setup-bun@v2
      - run: bun i
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs
      - name: Build Rust binary
        working-directory: rs
        run: cargo build --release
      - run: bun run build
      - run: bun run test

      # semantic-release: bump version, update package.json + Cargo.toml,
      # create GitHub release + tag. npm publish is disabled (npmPublish: false).
      # After this, we explicitly dispatch rust-build.yml below.
      - run: bunx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Disable husky hooks so @semantic-release/git's commit doesn't trigger
          # pre-commit (fmt/build/test), which races the rust rebuild against
          # stale bins when rs/Cargo.toml was just bumped.
          HUSKY: "0"

      - name: Get new release tag
        id: get_tag
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "New release tag: $TAG"

      # Explicitly dispatch rust-build.yml so we can track the exact run ID.
      # (The release: published event on rust-build.yml is a backup; the dispatch here
      #  is what release.yml actually waits for.)
      - name: Trigger Rust build
        id: trigger_rust
        if: steps.get_tag.outputs.tag != ''
        run: |
          BEFORE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "Dispatching rust-build.yml for tag ${{ steps.get_tag.outputs.tag }} (after $BEFORE)..."
          gh workflow run rust-build.yml \
            --field tag=${{ steps.get_tag.outputs.tag }} \
            --field upload_release=true
          # Poll until we see the new run (created after dispatch)
          for i in $(seq 1 24); do
            sleep 5
            RUN_ID=$(gh run list --workflow=rust-build.yml --limit=10 --json databaseId,createdAt \
              -q ".[] | select(.createdAt >= \"$BEFORE\") | .databaseId" | head -1)
            if [ -n "$RUN_ID" ]; then
              echo "Found run ID: $RUN_ID"
              echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
              break
            fi
            echo "Waiting for run to appear... ($((i*5))s elapsed)"
          done
          if [ -z "$RUN_ID" ]; then
            echo "ERROR: rust-build.yml run not found after 2 minutes"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for Rust build to complete
        if: steps.get_tag.outputs.tag != ''
        run: |
          echo "Watching rust-build.yml run ${{ steps.trigger_rust.outputs.run_id }}..."
          gh run watch "${{ steps.trigger_rust.outputs.run_id }}" --exit-status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Now publish to npm — binaries are guaranteed to be on the GitHub release.
      - name: Publish agent-yes to npm
        if: steps.get_tag.outputs.tag != ''
        run: npm publish --access public || echo "npm publish skipped (version already exists)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish claude-yes to npm
        if: steps.get_tag.outputs.tag != ''
        run: |
          npm pkg set name=claude-yes
          npm publish --access public || echo "npm publish skipped (version already exists)"
          npm pkg set name=agent-yes
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
