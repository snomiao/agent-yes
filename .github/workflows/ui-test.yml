name: UI Test

# The console's pure logic (lab/ui/console-logic.js) is unit-tested in the main
# Matrix Test suite. THIS workflow runs the heavier xterm.js render test
# (tests/ui-test) — Playwright screenshots judged by Gemini Vision. It is:
#   - scoped to lab/ui changes (and manual dispatch) so it doesn't run on every push,
#   - non-blocking (continue-on-error) because the Gemini judge is non-deterministic
#     and needs the GEMINI_API_KEY secret (without it the test self-skips).
# Screenshots are uploaded as artifacts for human inspection regardless.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "lab/ui/**"
      - "tests/ui-test/**"
      - ".github/workflows/ui-test.yml"
  pull_request:
    branches: [main]
    paths:
      - "lab/ui/**"
      - "tests/ui-test/**"

jobs:
  # Deterministic, hermetic DOM test of the real console — blocking.
  ui-dom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
      - name: Run deterministic console DOM test
        run: bun run test:ui-dom

  # Heavier xterm render fidelity test (Gemini Vision) — non-blocking.
  ui-render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
      - name: Run UI render test (xterm.js → Gemini Vision judge)
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: bun run test:ui
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: tests/ui-test/screenshots/
          if-no-files-found: ignore

  # Deploy the console to agent-yes.com (Cloudflare Worker) — only on push to
  # main, and only after the deterministic DOM test passes. Uses the
  # CLOUDFLARE_API_TOKEN secret; scripts/cf.ts pins the SNOLAB account.
  deploy:
    needs: [ui-dom]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Stage console assets
        run: |
          mkdir -p lab/ui/cf/public
          cp lab/ui/index.html lab/ui/room-client.js lab/ui/console-logic.js lab/ui/cf/public/
      # The SNOLAB token (`agent-yes-snolab`) lacks Workers Routes / User-Details
      # read, so wrangler prints an "Authentication error [code: 10000]" and
      # exits non-zero AFTER the Worker version + assets have already uploaded —
      # harmless (the custom domains already exist). Gate success on the upload
      # line instead of the exit code, else every deploy reports a false failure.
      - name: Deploy Worker (agent-yes.com)
        working-directory: lab/ui/cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -o pipefail
          bun ../../../scripts/cf.ts deploy 2>&1 | tee deploy.log || true
          if grep -Eq "Uploaded agent-yes-signal|Deployed agent-yes-signal|Current Version ID" deploy.log; then
            echo "::notice::Worker uploaded — route/auth tail-error is harmless (token lacks Routes/User-Details read)."
          else
            echo "::error::Wrangler did not upload the Worker."
            exit 1
          fi
