name: Build Rust Binaries

on:
  # PR builds for testing (no release upload)
  pull_request:
    branches: [main]
    paths:
      - "rs/**"

  # Triggered by release.yml after semantic-release creates a new tag
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g., v1.46.5)"
        required: false
        type: string
      upload_release:
        description: "Upload to GitHub release"
        required: false
        default: "true"
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: agent-yes-linux-x64
            ext: ""

          # Linux x64 (musl - static)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: agent-yes-linux-x64-musl
            ext: ""

          # Linux ARM64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: agent-yes-linux-arm64
            ext: ""
            cross: true

          # Linux ARM64 (musl - static)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: agent-yes-linux-arm64-musl
            ext: ""
            cross: true

          # macOS x64 (Intel) — cross-compiled from Linux via cargo-zigbuild
          # (no macOS runner: the zigbuild Docker image bundles the macOS SDK).
          - target: x86_64-apple-darwin
            os: ubuntu-latest
            artifact: agent-yes-darwin-x64
            ext: ""
            zig: true

          # macOS ARM64 (Apple Silicon) — cross-compiled from Linux via zigbuild
          - target: aarch64-apple-darwin
            os: ubuntu-latest
            artifact: agent-yes-darwin-arm64
            ext: ""
            zig: true

          # Windows x64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: agent-yes-win32-x64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Checkout release tag
        if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
        shell: bash
        run: |
          echo "Building from tag: ${{ inputs.tag }}"
          echo "RELEASE_TAG=${{ inputs.tag }}" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux musl)
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.cross && contains(matrix.target, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Copy default.config.yaml into rs/
        shell: bash
        run: cp default.config.yaml rs/default.config.yaml

      - name: Build with cross
        if: matrix.cross
        working-directory: rs
        run: cross build --release --target ${{ matrix.target }}

      # Cross-compile the macOS binaries from Linux with cargo-zigbuild. The
      # image ships zig + the macOS SDK, so no macOS runner is needed. build.rs
      # takes its "CI cross-build" branch (rs/default.config.yaml already copied
      # above, ../default.config.yaml absent inside the rs-only mount). Output
      # lands in rs/target/<target>/release/agent-yes, same path the native
      # build uses, so "Prepare artifact" below is unchanged.
      - name: Build darwin with cargo-zigbuild (Docker)
        if: matrix.zig
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/rs":/io \
            -w /io \
            -e CARGO_TERM_COLOR=always \
            ghcr.io/rust-cross/cargo-zigbuild:latest \
            bash -c "rustup target add ${{ matrix.target }} && cargo zigbuild --release --locked --target ${{ matrix.target }} --bin agent-yes"

      - name: Build with cargo
        if: "!matrix.cross && !matrix.zig"
        working-directory: rs
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifacts
          cp rs/target/${{ matrix.target }}/release/agent-yes${{ matrix.ext }} artifacts/${{ matrix.artifact }}${{ matrix.ext }}
          chmod +x artifacts/${{ matrix.artifact }}${{ matrix.ext }} || true
          # Windows also ships the ay-spawn-hidden launcher (a second [[bin]]).
          # `ay serve install` interposes it so pm2/oxmgr don't flash a console
          # window on each daemon (re)start. It rides along in the same zip and
          # extracts beside the main binary in rustBinary.ts getBinDir().
          if [ "${{ matrix.ext }}" = ".exe" ]; then
            cp rs/target/${{ matrix.target }}/release/ay-spawn-hidden.exe artifacts/ay-spawn-hidden.exe
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/
          if-no-files-found: error

  # Create a combined artifact with all binaries
  combine:
    name: Combine Artifacts
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Combine into single directory
        run: |
          mkdir -p combined
          for dir in binaries/*/; do
            cp "$dir"* combined/ || true
          done
          ls -la combined/

      - name: Upload combined artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-yes-all-platforms
          path: combined/
          if-no-files-found: error

  # Upload to GitHub Release
  release:
    name: Upload to Release
    needs: build
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && inputs.upload_release == true)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Create release archives
        run: |
          cd binaries
          for dir in agent-yes-*/; do
            name="${dir%/}"
            if [[ "$name" == *"win32"* ]]; then
              zip -j "../${name}.zip" "$dir"*
            else
              tar -czvf "../${name}.tar.gz" -C "$dir" .
            fi
          done
          cd ..
          ls -la *.tar.gz *.zip 2>/dev/null || true

      - name: Get release tag
        id: get_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload release assets
        if: steps.get_tag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip
          tag_name: ${{ steps.get_tag.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.get_tag.outputs.tag, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
