<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>agent-yes · console</title>
    <style>
      /* Palette borrowed from codehost (GitHub-dark) so the two feel like one system. */
      :root {
        /* Adapt native form controls / scrollbars to the OS theme too. */
        color-scheme: light dark;
        --bg: #0d1117;
        --panel: #161b22;
        --panel2: #1c2430;
        --line: #2d3748;
        --line2: #222b38;
        --fg: #e6edf3;
        --muted: #8b949e;
        --accent: #58a6ff;
        --green: #3fb950;
        --amber: #d29922;
        --purple: #bc8cff;
        --pink: #f778ba;
        --red: #f85149;
        --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      }
      /* Light theme — GitHub-light, the daylight counterpart of the dark palette
         above. prefers-color-scheme is re-evaluated by the browser the moment the
         OS flips, so every var() consumer recolors in real time, no JS, no reload.
         (The xterm canvas is the one exception — it's repainted from JS, see
         termTheme() below.) */
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #ffffff;
          --panel: #f6f8fa;
          --panel2: #eaeef2;
          --line: #d1d9e0;
          --line2: #d8dee4;
          --fg: #1f2328;
          --muted: #59636e;
          --accent: #0969da;
          --green: #1a7f37;
          --amber: #9a6700;
          --purple: #8250df;
          --pink: #bf3989;
          --red: #cf222e;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        height: 100vh;
        height: 100dvh; /* dodge the iOS/Android dynamic toolbar resize */
        overflow: hidden;
        -webkit-text-size-adjust: 100%;
        font:
          14px/1.55 -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          system-ui,
          sans-serif;
      }
      code {
        font-family: var(--mono);
        font-size: 12.5px;
        background: var(--panel2);
        padding: 1px 5px;
        border-radius: 5px;
        color: var(--purple);
      }

      /* grid-template-rows:minmax(0,1fr) caps the row at the viewport so the inner
     panes scroll instead of growing the page (the min-height:0 below lets the
     flex children actually shrink — without it overflow:auto never engages). */
      .app {
        display: grid;
        grid-template-columns: var(--leftw, 42%) 1px 1fr;
        grid-template-rows: minmax(0, 1fr);
        height: 100vh;
        height: 100dvh;
      }

      /* VSCode-style splitter: the visible divider stays 1px, but a ::before
         overlay widens the pointer hit area to ~11px so it's easy to grab. */
      .splitter {
        position: relative;
        background: var(--line);
        cursor: col-resize;
        z-index: 5;
      }
      .splitter::before {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: -5px;
        right: -5px;
      }
      .splitter:hover,
      .splitter.drag {
        background: var(--accent);
      }

      /* ---- left: list ---- */
      .left {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
      }
      .head {
        padding: 16px 18px 10px;
        border-bottom: 1px solid var(--line);
      }
      h1 {
        font-size: 18px;
        margin: 0 0 2px;
        letter-spacing: -0.02em;
      }
      h1 .tag {
        color: var(--accent);
      }
      /* Connection-path pill in the header: at a glance, is the terminal you're
         watching on the fast local/lan path or the slow relayed path? */
      /* Per-peer connection-type pill in the terminal header — describes how this
         viewer reaches the SELECTED agent's host (local/lan/wan/relay). */
      .rhead .ctype {
        position: relative;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.02em;
        align-self: center;
        padding: 1px 7px;
        border-radius: 999px;
        border: 1px solid currentColor;
        text-transform: uppercase;
        opacity: 0.9;
        cursor: help;
      }
      .ctype[hidden] {
        display: none;
      }
      /* Hover popover with the connection debug readout. */
      .ctype .ctip {
        display: none;
        position: absolute;
        top: 150%;
        right: 0;
        z-index: 30;
        min-width: 240px;
        padding: 8px 10px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        color: var(--fg);
        font-family: var(--mono);
        font-size: 10.5px;
        font-weight: 400;
        line-height: 1.6;
        letter-spacing: 0;
        text-transform: none;
        text-align: left;
        white-space: nowrap;
      }
      .ctype:hover .ctip {
        display: block;
      }
      .ctip-h {
        color: var(--muted);
        margin-bottom: 5px;
        white-space: normal;
      }
      .ctip-k {
        display: inline-block;
        width: 56px;
        color: var(--muted);
      }
      /* ⋯ overflow menu in the terminal header + its dropdown. */
      .rmenu {
        position: relative;
        margin-left: auto;
      }
      .rmenubtn {
        background: none;
        border: none;
        color: var(--muted);
        font-size: 16px;
        line-height: 1;
        cursor: pointer;
        padding: 2px 6px;
        border-radius: 6px;
      }
      .rmenubtn:hover {
        background: var(--panel);
        color: var(--fg);
      }
      .rmenupanel {
        position: absolute;
        top: 26px;
        right: 0;
        z-index: 15;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 4px;
        min-width: 140px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
      }
      .rmenupanel[hidden] {
        display: none;
      }
      .rmenuitem {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 5px 8px;
        font-size: 12.5px;
        border-radius: 6px;
        cursor: pointer;
        user-select: none;
      }
      .rmenuitem:hover {
        background: var(--bg);
      }
      .rmenuitem input {
        margin: 0;
        cursor: pointer;
      }
      /* Action items (Stop / Force-kill) reuse the menu-item look as buttons. */
      .rmenuact {
        width: 100%;
        background: none;
        border: none;
        text-align: left;
        font: inherit;
        color: var(--fg);
      }
      .rmenuact.danger {
        color: var(--red);
      }
      .rmenusep {
        height: 1px;
        background: var(--line);
        margin: 4px 2px;
      }
      /* Live performance HUD — opt-in via the ⋯ menu, hidden by default. */
      .perfhud {
        position: absolute;
        top: 44px;
        right: 12px;
        z-index: 14;
        background: rgba(13, 17, 23, 0.82);
        color: var(--fg);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 7px 10px;
        font-family: var(--mono);
        font-size: 11px;
        line-height: 1.5;
        pointer-events: none;
        white-space: pre;
        backdrop-filter: blur(3px);
      }
      .perfhud[hidden] {
        display: none;
      }
      .perfhud b {
        color: var(--accent);
        font-weight: 600;
      }
      /* Per-peer connection-type tag on peer-group headers in the tree. */
      .ghead .ctag {
        font-size: 9.5px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        margin-left: 6px;
        padding: 0 5px;
        border-radius: 999px;
        border: 1px solid currentColor;
        opacity: 0.85;
      }
      .sub {
        color: var(--muted);
        font-size: 12.5px;
      }
      .install {
        margin-top: 8px;
        color: var(--muted);
        font-size: 11.5px;
      }
      .install code {
        cursor: pointer;
        color: var(--green);
      }
      .install code:hover {
        filter: brightness(1.25);
      }
      .install code {
        word-break: break-all;
      }
      .ibox {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 7px 11px;
        margin-top: 11px;
      }
      .ibox:focus-within {
        border-color: var(--accent);
      }
      .ibox .mag {
        color: var(--muted);
      }
      #q {
        flex: 1;
        background: transparent;
        border: 0;
        outline: 0;
        color: var(--fg);
        font: 13px var(--mono);
      }
      .meta {
        display: flex;
        justify-content: space-between;
        color: var(--muted);
        font-size: 11.5px;
        margin-top: 8px;
      }
      .connbadge {
        cursor: pointer;
        user-select: none;
      }
      .connbadge:hover {
        filter: brightness(1.3);
      }
      .rooms {
        position: relative;
        margin-top: 8px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 8px;
        font-size: 12px;
      }
      .rooms .rtitle {
        color: var(--muted);
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 2px 4px 6px;
      }
      .rooms .ritem {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 6px;
        border-radius: 7px;
      }
      .rooms .ritem:hover {
        background: var(--panel2);
      }
      .rooms .ritem.cur {
        box-shadow: inset 2px 0 0 var(--green);
      }
      .rooms .rstat {
        font-family: var(--mono);
        font-size: 10.5px;
        flex: none;
        min-width: 18px;
      }
      .rooms .rstat.on {
        color: var(--green);
      }
      .rooms .rstat.off {
        color: var(--muted);
        opacity: 0.6;
      }
      .rooms .rname {
        font-family: var(--mono);
        color: var(--accent);
        cursor: pointer;
        flex: 1;
      }
      .rooms .rhost {
        color: var(--muted);
        font-family: var(--mono);
        font-size: 10.5px;
      }
      .rooms .rx {
        color: var(--muted);
        cursor: pointer;
        padding: 0 4px;
      }
      .rooms .rx:hover {
        color: var(--red);
      }
      .rooms .radd {
        display: flex;
        gap: 6px;
        margin-top: 6px;
        padding-top: 6px;
        border-top: 1px solid var(--line2);
      }
      .rooms .radd input {
        flex: 1;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: 7px;
        color: var(--fg);
        font: 11.5px var(--mono);
        padding: 6px 8px;
        outline: 0;
      }
      .rooms .radd button {
        background: var(--accent);
        color: var(--bg);
        border: 0;
        border-radius: 7px;
        font-weight: 600;
        padding: 0 12px;
        cursor: pointer;
      }
      .rooms .empty2 {
        color: var(--muted);
        padding: 6px;
      }
      .rooms .rconnect {
        margin-top: 6px;
        padding: 8px 6px 2px;
        border-top: 1px solid var(--line2);
        color: var(--muted);
        font-size: 11px;
        line-height: 1.7;
      }
      .rooms .rconnect code {
        display: block;
        margin-top: 4px;
        cursor: pointer;
      }
      .rooms .rconnect code:hover {
        color: var(--accent);
      }

      /* launch overlay (command-only launch URLs: #launch=<json>) */
      .launchoverlay {
        position: fixed;
        inset: 0;
        z-index: 20;
        background: rgba(2, 6, 12, 0.7);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .lcard {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 22px 24px;
        width: min(560px, 92vw);
      }
      .lcard .ltitle {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 12px;
      }
      .lcard .lcmd {
        font-family: var(--mono);
        font-size: 13px;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
        color: var(--green);
        word-break: break-word;
      }
      .lcard .lcwd {
        color: var(--muted);
        font-family: var(--mono);
        font-size: 11.5px;
        margin-top: 6px;
      }
      .lcard .lfleets {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 16px;
      }
      .lcard .lfleet {
        background: var(--accent);
        color: var(--bg);
        border: 0;
        border-radius: 8px;
        font-weight: 600;
        font-family: var(--mono);
        padding: 8px 14px;
        cursor: pointer;
      }
      .lcard .lwarn {
        color: var(--amber);
        font-size: 12.5px;
        margin-top: 16px;
        line-height: 1.6;
      }
      .lcard .lwarn code {
        font-family: var(--mono);
        background: var(--bg);
        padding: 1px 6px;
        border-radius: 5px;
        color: var(--fg);
      }
      .lcard .lhint {
        color: var(--muted);
        font-size: 11.5px;
        margin-top: 12px;
      }
      .lcard .lcancel {
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 6px 14px;
        cursor: pointer;
        margin-top: 16px;
      }

      /* new-agent button (header) + spawn form (reuses the launch overlay shell) */
      .metaright {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .newbtn {
        background: var(--accent);
        color: var(--bg);
        border: 0;
        border-radius: 7px;
        font-weight: 600;
        font-size: 11.5px;
        padding: 4px 11px;
        cursor: pointer;
        line-height: 1.6;
      }
      .newbtn:hover {
        filter: brightness(1.12);
      }
      .viewbtn {
        background: transparent;
        border: 1px solid var(--line);
        border-radius: 7px;
        color: var(--muted);
        font-size: 11.5px;
        padding: 3px 9px;
        cursor: pointer;
        line-height: 1.6;
      }
      .viewbtn:hover {
        color: var(--fg);
        border-color: var(--accent);
      }
      .viewbtn.on {
        color: var(--accent);
        border-color: var(--accent);
      }
      .lcard .nfield {
        margin-top: 12px;
      }
      .lcard .nfield label {
        display: block;
        color: var(--muted);
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 4px;
      }
      .lcard .nfield input,
      .lcard .nfield textarea {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--fg);
        font: 13px var(--mono);
        padding: 8px 10px;
        outline: 0;
        resize: vertical;
      }
      .lcard .nfield input:focus,
      .lcard .nfield textarea:focus {
        border-color: var(--accent);
      }
      .lcard .lrow {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 18px;
      }
      .lcard .lrow .lcancel {
        margin-top: 0;
      }
      .lfleet:disabled {
        opacity: 0.5;
        cursor: progress;
      }

      .list {
        overflow-y: auto;
        flex: 1;
        min-height: 0;
      }
      .row {
        padding: 11px 18px;
        border-bottom: 1px solid var(--line2);
        cursor: pointer;
      }
      .row:hover {
        background: var(--panel);
      }
      .row.sel {
        background: var(--panel);
        box-shadow: inset 3px 0 0 var(--accent);
      }
      .r1 {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex: none;
      }
      .dot.active,
      .dot.running {
        background: var(--green);
      }
      .dot.idle {
        background: var(--amber);
      }
      .dot.stopped,
      .dot.exited {
        background: var(--muted);
      }
      .name {
        font-weight: 600;
      }
      .badge {
        font-family: var(--mono);
        font-size: 10.5px;
        padding: 1px 6px;
        border-radius: 5px;
        border: 1px solid var(--line);
        color: var(--muted);
      }
      .age {
        margin-left: auto;
        color: var(--muted);
        font-size: 11.5px;
      }
      /* git chip: ±changed ↑ahead ↓behind, amber when the worktree is dirty */
      .git {
        font-family: var(--mono);
        font-size: 10.5px;
        color: var(--muted);
        white-space: nowrap;
        flex: none;
      }
      .git.dirty {
        color: var(--amber);
      }
      /* Task-progress badge ("2/5") parsed from the agent's todo block, sits next
         to the git chip. Pill so it reads as a discrete counter; green when all
         tasks are done. */
      .tasks {
        font-family: var(--mono);
        font-size: 10.5px;
        color: var(--muted);
        white-space: nowrap;
        flex: none;
        padding: 0 5px;
        border: 1px solid var(--line);
        border-radius: 8px;
      }
      .tasks.done {
        color: var(--green);
        border-color: #2a3a2a;
      }
      .detail {
        color: var(--muted);
        font-size: 12.5px;
        margin-top: 4px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .rowtitle {
        color: var(--fg);
        font-size: 12.5px;
        margin-top: 4px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      /* compact view: one line per agent — dot + cli + live title (or prompt), age */
      .row.crow {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 18px;
      }
      /* Tree branch prefix for nested (sub)agents — monospace so the box-drawing
         glyphs line up into continuous │ ├ └ rails across rows. */
      .tbranch {
        font-family: var(--mono);
        color: var(--muted);
        white-space: pre;
        flex: none;
        opacity: 0.7;
        margin-right: -2px;
      }
      /* Room/peer group header rows (the upper layers of the tree). Non-selectable,
         dimmer and smaller than agent rows so they read as containers, not agents. */
      .ghead {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 5px 18px 2px;
        font-size: 11.5px;
        color: var(--muted);
        user-select: none;
      }
      .ghead .gicon {
        opacity: 0.6;
        flex: none;
      }
      .ghead .glabel {
        font-weight: 600;
        color: var(--fg);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .ghead.g-room .glabel {
        color: var(--accent);
      }
      .ghead .gkind {
        font-size: 10px;
        opacity: 0.45;
        flex: none;
      }
      .crow .cident {
        font-family: var(--mono);
        font-size: 11.5px;
        color: var(--green);
        flex: none;
      }
      .crow .cname {
        font-weight: 600;
        color: var(--purple);
        flex: none;
      }
      .crow .ctitle {
        flex: 1;
        min-width: 0;
        font-size: 12.5px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .crow .ctitle.dim {
        color: var(--muted);
      }
      .crow .age {
        margin-left: 0;
        flex: none;
      }
      .rowtags {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 6px;
      }
      .rtag {
        font-family: var(--mono);
        font-size: 11px;
        padding: 1px 7px;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: var(--muted);
        white-space: nowrap;
      }
      .rtag[data-k="repo"],
      .rtag[data-k="wt"] {
        color: var(--green);
        border-color: #1d3b25;
      }
      .rtag[data-k="cli"] {
        color: var(--purple);
        border-color: #3a2a4a;
      }
      .empty {
        text-align: center;
        color: var(--muted);
        padding: 40px;
      }

      /* ---- right: live tail + send (this is what codehost structurally can't do) ---- */
      .right {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        position: relative; /* anchor for the absolutely-positioned perf HUD */
      }
      .rhead {
        padding: 14px 20px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .rhead .name {
        font-size: 15px;
      }
      /* back-to-list affordance — only surfaces in the single-column mobile view */
      .rback {
        display: none;
        align-items: center;
        justify-content: center;
        flex: none;
        width: 30px;
        height: 30px;
        margin: -4px 2px -4px -6px;
        padding: 0;
        background: transparent;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--fg);
        font-size: 19px;
        line-height: 1;
        cursor: pointer;
      }
      .rback:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .rhead .live {
        margin-left: auto;
        font-size: 11px;
        font-family: var(--mono);
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .rhead .live .dot {
        width: 7px;
        height: 7px;
      }
      .log {
        flex: 1;
        min-height: 0;
        overflow: hidden;
        padding: 8px 10px;
        background: var(--bg);
      }
      .log .xterm {
        height: 100%;
      }
      .log .xterm-viewport {
        background: transparent !important;
      }
      .placeholder {
        display: flex;
        align-items: center;

    <script type="module">
      // Pure list/identity/filter helpers live in a sibling module so they can be
      // unit-tested (tests/ui-logic/console-logic.spec.ts) without a DOM. This
      // script is a module (deferred, runs after the codehost shim above sets
      // window.__codehost), so a static import is safe.
      import {
        cliLabel,
        repoBranch,
        ident,
        tagsFor,
        gitLabel,
        age,
        matches,
        nextIndex,
        identContext,
        compactIdent,
        fullIdent,
        hasIdent,
        deviceCount,
        layeredRows,
        taskLabel,
      } from "./console-logic.js";
      import {
        MARKER as E2E_MARKER,
        ALLOW_LEGACY_PLAINTEXT,
        FLAG_CONFIRM,
        CONFIRM_TIMEOUT_MS,
        deriveAuthToken,
        deriveDirKeys,
        computeTranscriptHash,
        seal as e2eSeal,
        open as e2eOpen,
        packEnvelope,
        unpackEnvelope,
        parseSecret,
        randomHex,
      } from "./e2e.js";

      let entries = [];
      let sel = null; // selected agent's composite key (room#pid)
      let es = null; // live-tail subscription closer
      let term = null; // xterm.js Terminal rendering the raw PTY stream
      let fit = null;

      // xterm paints to a <canvas>, so unlike the CSS var() consumers it can't
      // ride prefers-color-scheme on its own — its theme is a JS object. Mirror
      // the OS preference here and re-apply it live when the system flips, so the
      // terminal recolors in lockstep with the rest of the UI.
      const prefersLight = window.matchMedia("(prefers-color-scheme: light)");
      const termTheme = () =>
        prefersLight.matches
          ? {
              // GitHub-light terminal palette. xterm's default ANSI slots are
              // tuned for a dark background, so setting only bg/fg/cursor leaves
              // white & bright-white SGR text (37/97) — common in CLI output —
              // near-invisible on #ffffff. Remap the white slots to dark grays
              // and darken the rest so every ANSI color stays legible on light.
              background: "#ffffff",
              foreground: "#1f2328",
              cursor: "#1f2328",
              selectionBackground: "#b6d6ff",
              black: "#24292e",
              red: "#cf222e",
              green: "#116329",
              yellow: "#4d2d00",
              blue: "#0969da",
              magenta: "#8250df",
              cyan: "#1b7c83",
              white: "#6e7781",
              brightBlack: "#57606a",
              brightRed: "#a40e26",
              brightGreen: "#1a7f37",
              brightYellow: "#633c01",
              brightBlue: "#218bff",
              brightMagenta: "#a475f9",
              brightCyan: "#3192aa",
              brightWhite: "#1f2328",
            }
          : { background: "#0d1117", foreground: "#c9d1d9", cursor: "#0d1117" };
      // Exposed so the headless theme e2e can assert the light ANSI palette
      // keeps the white slots dark (legible on a white terminal background).
      window.__termTheme = termTheme;
      prefersLight.addEventListener("change", () => {
        if (term) term.options.theme = termTheme();
      });

      const $ = (id) => document.getElementById(id);
      const esc = (s) =>
        String(s ?? "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[c]);

      // ---- transport ---------------------------------------------------------
      // Local: same-origin fetch + EventSource (via the ay-serve proxy).
      // Remote: an /api/* call tunnelled over a WebRTC DataChannel to a peer running
      // `ay serve --share` — established through the signaling server. Same call
      // sites, two wires. Remote is selected by a URL hash: #room:token[@sighost].
      const SIG_DEFAULT = "s.agent-yes.com"; // signaling host (override in the hash with @host)
      const SUB = "ay-signal-1";

      // Tunnels request/response + streaming over one DataChannel. Mirrors the
      // envelope in lab/ui/share-host.ts: {t:"req"|"abort"} out, {t:"res"|"data"|"end"} in.
      class RTCClient {
        constructor(host, room, token) {
          let resolveKeys;
          const keysReady = new Promise((r) => (resolveKeys = r));
          Object.assign(this, {
            host,
            room,
            token,
            dc: null,
            calls: new Map(),
            streams: new Map(),
            onstate: () => {},
            // e2e (v2) per-connection state
            _s: null,
            _v2: false,
            _send: { sendCtr: 0n },
            _recvState: { lastSeen: -1n },
            _tHash: null,
            _keyH2C: null, // host->client: client decrypts with this
            _keyC2H: null, // client->host: client encrypts with this
            _keysReady: keysReady,
            _resolveKeys: resolveKeys,
            _myNonce: randomHex(16),
            _confirmedIn: false,
            _confirmedOut: false,
            _confirmed: false,
            _confirmTimer: null,
            _recvChain: Promise.resolve(), // serialize decrypts (ordered replay check)
            _sendChain: Promise.resolve(), // serialize seals (wire order == counter order)
          });
        }
        async connect() {
          // Parse the secret marker (fail-closed on malformed) and split into the
          // server-visible authToken vs the end-to-end keys the server never sees.
          const { s, v2 } = parseSecret(this.token);
          this._s = s;
          this._v2 = v2;
          if (!v2 && !ALLOW_LEGACY_PLAINTEXT)
            throw new Error(
              "this link uses the old unencrypted protocol — ask the host to upgrade",
            );
          const authToken = v2 ? await deriveAuthToken(s, this.room, this.host) : this.token;
          return new Promise((resolve, reject) => {
            const ws = new WebSocket(`wss://${this.host}/${this.room}`, [SUB]);
            this.ws = ws; // kept so close() can drop the signaling registration too
            let pc,
              settled = false;
            const fail = (e) => {
              if (!settled) {
                settled = true;
                reject(e);
              }
            };
            // Resolve ONLY after the mutual key-confirmation completes (see _dcRecv),
            // never on bare dc.onopen — there must be no "connected but unverified" window.
            const done = () => {
              if (!settled) {
                settled = true;
                this.onstate("open");
                resolve();
              }
            };
            ws.onopen = () =>
              ws.send(JSON.stringify({ type: "hello", role: "client", v: 2, token: authToken }));
            ws.onmessage = async (ev) => {
              const m = JSON.parse(ev.data);
              if (m.type === "welcome") {
                if (this._v2 && m.v !== 2)
                  return fail(new Error("host is running an old agent-yes — ask it to upgrade"));
                // pc is created on the offer below so it can use the host-supplied
                // iceServers (incl. short-lived TURN creds for relaying behind NAT).
              } else if (m.type === "offer") {
                if (!pc) {
                  pc = new RTCPeerConnection({
                    iceServers:
                      m.iceServers && m.iceServers.length
                        ? m.iceServers
                        : [{ urls: "stun:stun.l.google.com:19302" }],
                  });
                  this.pc = pc;
                  pc.onicecandidate = (e) => {
                    if (e.candidate)
                      ws.send(JSON.stringify({ type: "candidate", candidate: e.candidate }));
                  };
                  pc.onconnectionstatechange = () => this.onstate(pc.connectionState);
                  pc.ondatachannel = (e) => {
                    this.dc = e.channel;
                    this.dc.binaryType = "arraybuffer";
                    this.dc.onopen = async () => {
                      try {
                        await this._keysReady;
                        // Open the bidirectional confirmation handshake.
                        this._dcSend(FLAG_CONFIRM, { t: "confirm", nonce: this._myNonce });
                        this._confirmTimer = setTimeout(() => {
                          if (!this._confirmed) fail(new Error("key confirmation timed out"));
                        }, CONFIRM_TIMEOUT_MS);
                      } catch (err) {
                        fail(err);
                      }
                    };
                    this.dc.onmessage = (ev2) => {
                      this._recvChain = this._recvChain
                        .then(() => this._dcRecv(ev2.data, done))
                        .catch(() => {});
                    };
                    this.dc.onclose = () => this.onstate("closed");
                  };
                }
                await pc.setRemoteDescription({ type: "offer", sdp: m.sdp });
                await pc.setLocalDescription(await pc.createAnswer());
                ws.send(JSON.stringify({ type: "answer", sdp: pc.localDescription.sdp }));
                // Derive per-connection keys now both descriptions are stable, before
                // the DataChannel opens. Client: remote=host offer, local=our answer.
                try {
                  this._tHash = await computeTranscriptHash(
                    pc.remoteDescription.sdp,
                    pc.localDescription.sdp,
                  );
                  const { keyH2C, keyC2H } = await deriveDirKeys(this._s, this._tHash);
                  this._keyH2C = keyH2C;
                  this._keyC2H = keyC2H;
                  this._resolveKeys();
                } catch (err) {
                  fail(err);
                }
              } else if (m.type === "candidate") {
                if (pc) await pc.addIceCandidate(m.candidate).catch(() => {});
              }
            };
            ws.onerror = () => fail(new Error("signaling error"));
            ws.onclose = () => fail(new Error("signaling closed"));
            setTimeout(() => fail(new Error("connect timeout")), 8000);
          });
        }
        // Seal an envelope and send it, serialized so wire order == counter order.
        _dcSend(flags, obj) {
          this._sendChain = this._sendChain.then(async () => {
            if (!this.dc || this.dc.readyState !== "open" || !this._keyC2H || !this._tHash) return;
            let frame;
            try {
              frame = await e2eSeal(
                this._keyC2H,
                this._send,
                flags,
                this._tHash,
                packEnvelope(obj),
              );
            } catch {
              this.close();
              return;
            }
            try {
              this.dc.send(frame);
            } catch {}
          });
          return this._sendChain;
        }
        // Decrypt + route one frame. Fail-closed: any failure, replay, string
        // frame, or pre-confirmation app frame closes the connection.
        async _dcRecv(data, done) {
          if (!this.dc) return;
          if (typeof data === "string" || !this._keyH2C || !this._tHash) return this.close();
          let env;
          try {
            const { plaintext } = await e2eOpen(this._keyH2C, data, this._tHash, this._recvState);
            env = unpackEnvelope(plaintext);
          } catch {
            return this.close();
          }
          if (!this._confirmed) {
            if (!env || env.t !== "confirm") return this.close();
            if (typeof env.nonce === "string" && !this._confirmedOut) {
              // Send (and flush) our echo BEFORE marking confirmed-out, so connect()
              // can't resolve and let a req() race ahead of the echo on the wire.
              await this._dcSend(FLAG_CONFIRM, {
                t: "confirm",
                nonce: this._myNonce,
                echo: env.nonce,
              });
              this._confirmedOut = true;
            }
            if (env.echo && env.echo === this._myNonce) this._confirmedIn = true;
            if (this._confirmedIn && this._confirmedOut) {
              this._confirmed = true;
              if (this._confirmTimer) clearTimeout(this._confirmTimer);
              done(); // connect() resolves only now — the channel is mutually verified
            }
            return;
          }
          if (!env || env.t === "confirm") return; // stray confirm after handshake
          this._recv(env);
        }
        _recv(r) {
          // Frames are authenticated + replay-checked before they reach here, so an
          // id we don't know is a late/cancelled response from the legitimate host,
          // not an attack — drop it rather than tear down the channel.
          const call = this.calls.get(r.id),
            stream = this.streams.get(r.id);
          if (r.t === "res") {
            if (call) call.status = r.status;
          } else if (r.t === "data") {
            if (call) {
              call.body += r.chunk;
              call.dataCount = (call.dataCount || 0) + 1;
            }
            if (stream) stream(r.chunk);
          } else if (r.t === "end") {
            if (call) {
              clearTimeout(call.timer);
              this.calls.delete(r.id);
              // end.seq is the count of data frames the host sent; a mismatch means
              // the stream was truncated, so don't resolve it as complete.
              if (typeof r.seq === "number" && r.seq !== (call.dataCount || 0))
                call.reject(new Error("truncated response"));
              else if (r.error) call.reject(new Error(r.error));
              else call.resolve({ status: call.status, text: call.body });
            }
          }
        }
        req(method, path, body) {
          const id = randomHex(16);
          return new Promise((resolve, reject) => {
            // Without a deadline a request over a silently-dead DataChannel (host
            // gone, ICE not yet timed out) never settles, so the caller — and the
            // poll loop — hangs forever and the room never reconnects. Reject on a
            // timeout so listSource sees the failure and triggers backoff.
            const timer = setTimeout(() => {
              if (this.calls.delete(id)) reject(new Error("request timed out"));
            }, 12000);
            this.calls.set(id, { status: 0, body: "", dataCount: 0, resolve, reject, timer });
            this._dcSend(0, { t: "req", id, method, path, body }).catch((e) => {
              clearTimeout(timer);
              this.calls.delete(id);
              reject(e); // channel already torn down
            });
          });
        }
        subscribe(path, onRaw) {
          const id = randomHex(16);
          this.streams.set(id, onRaw);
          this._dcSend(0, { t: "req", id, method: "GET", path });
          return () => {
            this.streams.delete(id);
            this._dcSend(0, { t: "abort", id });
          };
        }
        // Tear down BOTH wires. Closing only the pc leaves the signaling socket
        // open and this client registered in the room, so each reconnect would
        // leak another peer on the host. onstate is detached by the caller first.
        close() {
          if (this._confirmTimer) clearTimeout(this._confirmTimer);
          try {
            this.ws?.close();
          } catch {}
          try {
            this.pc?.close();
          } catch {}
          this.dc = null;
          // Settle anything still in flight now, rather than letting each req's
          // 12s timeout fire long after the client is gone.
          for (const c of this.calls.values()) {
            clearTimeout(c.timer);
            c.reject(new Error("connection closed"));
          }
          this.calls.clear();
          this.streams.clear();
        }
      }

      // ---- codehost rooms: a THIRD wire -----------------------------------
      // A codehost room can hold several machines: every `codehost serve`
      // daemon advertises its live agents (PeerMeta.agents) and proxies the
      // local ay-serve API over its WebRTC tunnel at /__codehost/agent-yes/*.
      // This wire aggregates all hosts' agents into one list, then routes each
      // per-agent call to the host that owns the pid. Known v1 limitation:
      // pids may collide across hosts (last listed wins); the host: tag keeps
      // them tellable-apart visually.
      const CH_API = "/__codehost/agent-yes";
      class CodehostClient {
        constructor(token) {
          Object.assign(this, { token, room: null, byPid: new Map(), onstate: () => {} });
        }
        async connect() {
          if (!window.__codehost)
            await new Promise((r) => window.addEventListener("codehost-ready", r, { once: true }));
          let firstPeers;
          const ready = new Promise((resolve) => (firstPeers = resolve));
          this.room = window.__codehost.joinRoom({
            token: this.token,
            onStatus: (open) => {
              if (!open) this.onstate("closed");
            },
            onPeers: () => {
              this.onstate("open");
              firstPeers();
            },
          });
          // First peer broadcast usually lands instantly after the WS opens;
          // don't hang the UI on an empty/unreachable room.
          await Promise.race([ready, new Promise((r) => setTimeout(r, 6000))]);
        }
        close() {
          this.room?.close();
        }
        hosts() {
          // Machines that can answer for agents: anything advertising agents,
          // plus root daemons (their ay serve may know agents the broadcast
          // hasn't picked up yet).
          return (this.room?.peers || []).filter(
            (p) => p.meta && ((p.meta.agents || []).length || p.meta.kind === "root"),
          );
        }
        anyHost() {
          const h = this.hosts();
          return h.length ? h[0].peerId : null;
        }
        peerFor(path) {
          const m = /^\/api\/(?:tail|size|resize|read|status)\/([^/?]+)/.exec(path);
          const kw = m ? decodeURIComponent(m[1]) : null;
          return (kw && this.byPid.get(kw)) || null;
        }
        async ls(path) {
          const hosts = this.hosts();
          const lists = await Promise.all(
            hosts.map(async (p) => {
              try {
                const res = await this.room.fetch(p.peerId, "GET", CH_API + path);
                if (!res.ok) throw new Error("HTTP " + res.status);
                return (await res.json()).map((e) => ({ ...e, _host: p.meta?.host }));
              } catch {
                // ay serve down on that host — fall back to the daemon-advertised list.
                return (p.meta?.agents || []).map((a) => ({
                  pid: a.pid,
                  cli: a.tool,
                  title: a.title || null,
                  prompt: a.title || null,
                  cwd: a.cwd,
                  status: a.state,
                  started_at: a.startedAt,
                  _host: p.meta?.host,
                }));
              }
            }),
          );
          const byPid = new Map();
          const merged = [];
          lists.forEach((arr, i) => {
            for (const e of arr) {
              byPid.set(String(e.pid), hosts[i].peerId);
              merged.push(e);
            }
          });
          this.byPid = byPid;
          return merged;
        }
        async fetchJSON(path) {
          if (path.startsWith("/api/ls")) return this.ls(path);
          const peer = this.peerFor(path) || this.anyHost();
          if (!peer) throw new Error("no codehost peer");
          const res = await this.room.fetch(peer, "GET", CH_API + path);
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.json();
        }
        async post(path, bodyObj) {
          const kw = bodyObj && bodyObj.keyword != null ? String(bodyObj.keyword) : null;
          const peer = (kw && this.byPid.get(kw)) || this.peerFor(path) || this.anyHost();
          if (!peer) return { ok: false, text: "no codehost peer in the room" };
          const res = await this.room.fetch(peer, "POST", CH_API + path, {
            headers: { "content-type": "application/json" },
            body: JSON.stringify(bodyObj),
          });
          return { ok: res.status >= 200 && res.status < 300, text: await res.text() };
        }
        subscribe(path, onText, onOpen, onError) {
          let cancelled = false;
          let reader = null;
          (async () => {
            const peer = this.peerFor(path) || this.anyHost();
            if (!peer) {
              onError && onError();
              return;
            }
            try {
              const res = await this.room.fetch(peer, "GET", CH_API + path, {
                headers: { accept: "text/event-stream" },
              });
              if (!res.ok || !res.body) throw new Error("HTTP " + res.status);
              onOpen && onOpen();
              reader = res.body.getReader();
              const dec = new TextDecoder();
              let buf = "";
              for (;;) {
                const { done, value } = await reader.read();
                if (done || cancelled) break;
                buf += dec.decode(value, { stream: true });
                let i;
                while ((i = buf.indexOf("\n\n")) >= 0) {
                  const evt = buf.slice(0, i);
                  buf = buf.slice(i + 2);
                  for (const line of evt.split("\n"))
                    if (line.startsWith("data:")) {
                      try {
                        onText(JSON.parse(line.slice(5).trim()));
                      } catch {}
                    }
                }
              }
              if (!cancelled) onError && onError();
            } catch {
              if (!cancelled) onError && onError();
            }
          })();
          return () => {
            cancelled = true;
            try {
              reader?.cancel();
            } catch {}
          };
        }
      }

      // `ay serve --http` serves this page itself and prints a #k=<token> link;
      // boot() stores the token and local /api calls carry it as ?token= (query,
      // not header — EventSource can't set headers). When served via the lab
      // proxy instead, no token is stored and paths stay bare (proxy injects).
      const withTok = (path) => {
        const t = localStorage.getItem("ay.localToken");
        return t
          ? path + (path.includes("?") ? "&" : "?") + "token=" + encodeURIComponent(t)
          : path;
      };

      // ---- transports: a uniform { fetchJSON, post, subscribe } over each wire ----
      // local (same-origin ay serve), an ay-share RTCClient, or a codehost room.
      // CodehostClient already exposes this shape, so it's used as a tx directly.
      const localTx = {
        async fetchJSON(path) {
          return (await fetch(withTok(path))).json();
        },
        async post(path, bodyObj) {
          const r = await fetch(withTok(path), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(bodyObj),
          });
          return { ok: r.ok, text: await r.text() };
        },
        subscribe(path, onText, onOpen, onError) {
          const ev = new EventSource(withTok(path));
          ev.onopen = () => onOpen && onOpen();
          ev.onmessage = (e) => onText(JSON.parse(e.data));
          ev.onerror = () => onError && onError();
          return () => ev.close();
        },
      };
      function rtcTx(rtc) {
        return {
          async fetchJSON(path) {
            return JSON.parse((await rtc.req("GET", path)).text);
          },
          async post(path, bodyObj) {
            const r = await rtc.req("POST", path, JSON.stringify(bodyObj));
            return { ok: r.status >= 200 && r.status < 300, text: r.text };
          },
          subscribe(path, onText, onOpen, onError) {
            onOpen && onOpen();
            let buf = "";
            return rtc.subscribe(path, (raw) => {
              buf += raw;
              let i;
              while ((i = buf.indexOf("\n\n")) >= 0) {
                const evt = buf.slice(0, i);
                buf = buf.slice(i + 2);
                for (const line of evt.split("\n"))
                  if (line.startsWith("data:")) {
                    try {
                      onText(JSON.parse(line.slice(5).trim()));
                    } catch {}
                  }
              }
            });
          },
        };
      }

      // ---- fleet: local + every saved room, all connected at once ------------
      // Each source contributes its agents to one merged list (tagged with the
      // owning source on `_room`/`_key`); per-agent ops route back via srcFor/txFor.
      // Live counts in the rooms panel come from each source's serverCount/devices.
      const LOCAL = "local";
      const sources = new Map(); // id -> { id, host, kind, tx, client, live, devices, serverCount }
      const srcFor = (e) => (e && sources.get(e._room)) || sources.get(LOCAL) || null;
      const txFor = (e) => srcFor(e)?.tx || localTx;

      // ---- connection-path classification (header [local/lan/wan/relay] pill) ----
      // Tells the user, at a glance, whether the terminal they're watching rides the
      // fast direct path or a relayed one — the difference between snappy and laggy.
      const isLoopbackIp = (ip) => ip === "::1" || /^127\./.test(ip);
      const isPrivateIp = (ip) =>
        /^10\./.test(ip) ||
        /^192\.168\./.test(ip) ||
        /^172\.(1[6-9]|2\d|3[01])\./.test(ip) ||
        /^169\.254\./.test(ip) || // IPv4 link-local
        /^100\.(6[4-9]|[7-9]\d|1[01]\d|12[0-7])\./.test(ip) || // CGNAT / Tailscale (100.64.0.0/10)
        /^fe80:/i.test(ip) || // IPv6 link-local
        /^f[cd][0-9a-f]{2}:/i.test(ip) || // IPv6 ULA (fc00::/7, incl. Tailscale fd7a:…)
        /\.local$/i.test(ip); // mDNS host candidate (browser-obfuscated LAN IP)
      // Inspect the selected ICE candidate pair and return the full picture for the
      // hover tooltip: kind, RTT, both candidates, a NAT-traversal hint, and the open
      // data channel. `kind` is classified by how we reach the REMOTE host: relay on
      // either end = TURN-proxied; otherwise the remote candidate's type/address
      // decides local/lan/wan. (The LOCAL end is often prflx/srflx even on a fast
      // private path — e.g. a Tailscale/CGNAT mesh shows local=prflx, remote=host
      // 100.x at ~1ms — so we key on the remote, not on both ends being `host`.)
      async function inspectConn(pc) {
        if (!pc || typeof pc.getStats !== "function") return null;
        try {
          const stats = await pc.getStats();
          let pairId = null;
          stats.forEach((s) => {
            if (s.type === "transport" && s.selectedCandidatePairId)
              pairId = s.selectedCandidatePairId;
          });
          let pair = null;
          stats.forEach((s) => {
            if (
              pairId
                ? s.id === pairId
                : s.type === "candidate-pair" && s.state === "succeeded" && s.nominated
            )
              pair = s;
          });
          if (!pair) return null;
          let local = null,
            remote = null;
          stats.forEach((s) => {
            if (s.id === pair.localCandidateId) local = s;
            if (s.id === pair.remoteCandidateId) remote = s;
          });
          if (!local || !remote) return null;
          const lt = local.candidateType,
            rt = remote.candidateType,
            rip = remote.address || remote.ip || "";
          let kind, nat;
          if (lt === "relay" || rt === "relay") {
            kind = "relay";
            nat = "TURN-relayed — symmetric NAT or UDP blocked";
          } else if (rt === "host") {
            kind = isLoopbackIp(rip) ? "local" : !rip || isPrivateIp(rip) ? "lan" : "wan";
            nat =
              lt === "host"
                ? "direct — both ends on-net"
                : "direct to host" + (lt === "srflx" || lt === "prflx" ? " (you behind NAT)" : "");
          } else {
            kind = "wan";
            nat = "STUN-reflexive P2P (NAT-traversed)";
          }
          const fmt = (c) => c.candidateType + "/" + (c.protocol || "?");
          return {
            kind,
            nat,
            rttMs:
              pair.currentRoundTripTime != null
                ? Math.round(pair.currentRoundTripTime * 1000)
                : null,
            local:
              fmt(local) + (local.address || local.ip ? " " + (local.address || local.ip) : ""),
            remote: fmt(remote) + (rip ? " " + rip : ""),
            dc:
              [...stats.values()]
                .filter((v) => v.type === "data-channel" && v.state === "open")
                .map((v) => v.label)
                .join(",") || null,
          };
        } catch {
          return null;
        }
      }
      // Resolve the live RTCPeerConnection that carries a SPECIFIC agent. A codehost
      // room holds one peer per host (room.rtcs keyed by peerId); byPid maps the
      // agent's pid to its peerId, so each agent resolves to ITS host's connection —
      // a VPS agent reads wan while a tak.local agent in the same room reads lan.
      function pcForAgent(s, e) {
        if (!s) return null;
        if (s.kind === "rtc") return s.client?.pc || null; // share room: one host
        if (s.kind === "ch") {
          const peerId = s.client?.byPid?.get(String(e?.pid));
          return (peerId && s.client?.room?.rtcs?.get(peerId)?.pc) || null;
        }
        return null; // local ay-serve has no peer connection
      }
      // Two cache views, both filled from one classification pass:
      //  - connKinds keyed by the true PEER (room + peerId) drives the header badge,
      //    so two machines that happen to share a hostname never collide.
      //  - hostKinds keyed by (room, host) drives the peer-group header tags, which
      //    only ever render when hosts are already distinct.
      const hostKeyOf = (e) => (e?._room || "") + " " + (e?._host || "");
      function peerKeyOf(s, e) {
        if (!s || s.id === LOCAL || s.kind == null) return LOCAL;
        if (s.kind === "ch") {
          const peerId = s.client?.byPid?.get(String(e?.pid));
          return s.id + " " + (peerId || e?._host || "");
        }
        return s.id; // rtc share: one peer per room
      }
      const connKinds = new Map(); // peerKey -> "local" | "lan" | "wan" | "relay"
      const hostKinds = new Map(); // hostKey -> same (peer-header tags)
      const connInfo = new Map(); // peerKey -> full detail for the hover tooltip
      let connSig = "";
      // The signaling server backing a source: codehost rooms use the codehost
      // signal DO; agent-yes share rooms use their own host; local has none.
      const signalingOf = (s) =>
        !s || s.id === LOCAL || s.kind == null
          ? null
          : s.kind === "ch"
            ? "wss://signal.codehost.dev"
            : "wss://" + (s.host || SIG_DEFAULT);
      const CTYPE_COLORS = {
        local: "var(--green)",
        lan: "var(--green)",
        wan: "var(--amber)",
        relay: "var(--red)",
      };
      const CTYPE_TIPS = {
        local: "this machine (ay serve, local)",
        lan: "direct over the local network (fast)",
        wan: "direct over the internet, peer-to-peer (STUN — RTT-bound)",
        relay: "TURN-relayed — proxied through a server (slowest path)",
      };
      // A small colored pill for a connection kind — reused by the header badge and
      // every peer-group header in the tree.
      function connTagHtml(kind) {
        if (!kind) return "";
        return `<span class="ctag" style="color:${CTYPE_COLORS[kind]}" title="${esc(CTYPE_TIPS[kind])}">${kind}</span>`;
      }
      // Classify every distinct peer in the fleet, caching by (room,host). Because
      // each agent reads its own host's path, a mixed room (VPS + laptop) shows both
      // wan and lan at once — exactly what tells you a "local" agent is wrongly remote.
      async function refreshConnKinds() {
        // Probe each distinct peer once (not once per agent), keyed by peerKey.
        const reps = new Map(); // peerKey -> a representative entry for that peer
        for (const e of entries) {
          const k = peerKeyOf(srcFor(e), e);
          if (!reps.has(k)) reps.set(k, e);
        }
        connKinds.clear();
        connInfo.clear();
        await Promise.all(
          [...reps].map(async ([key, e]) => {
            const s = srcFor(e);
            if (!s || s.id === LOCAL || s.kind == null) {
              if (s && s.live) {
                connKinds.set(key, "local");
                connInfo.set(key, {
                  kind: "local",
                  nat: "this machine (ay serve)",
                  signaling: null,
                });
              }
              return;
            }
            const info = await inspectConn(pcForAgent(s, e));
            if (info) {
              connKinds.set(key, info.kind);
              connInfo.set(key, { ...info, signaling: signalingOf(s) });
            }
          }),
        );
        // Project peer kinds onto (room,host) keys for the tree's peer headers.
        hostKinds.clear();
        for (const e of entries) {
          const kind = connKinds.get(peerKeyOf(srcFor(e), e));
          if (kind) hostKinds.set(hostKeyOf(e), kind);
        }
        paintHeaderBadge();
        // Repaint the list only when the peer-header tags actually changed — the poll
        // already re-renders on data deltas, so this avoids churning the DOM every tick.
        const sig = [...hostKinds]
          .sort()
          .map(([k, v]) => k + "=" + v)
          .join(";");
        if (sig !== connSig) {
          connSig = sig;
          renderList();
        }
      }
      // The terminal-header pill shows how this viewer reaches the SELECTED agent's
      // host peer (local/lan/wan/relay) — per-peer, contextual to what's open. Reads
      // the cache only (kept sync so renders never await); hidden when no agent is
      // open (the whole rhead is hidden then anyway).
      function paintHeaderBadge() {
        const badge = $("ctype");
        if (!badge) return;
        const e = sel ? entries.find((x) => x._key === sel) : null;
        const key = e ? peerKeyOf(srcFor(e), e) : null;
        const kind = key ? connKinds.get(key) : null;
        if (!kind) {
          badge.hidden = true;
          return;
        }
        badge.hidden = false;
        badge.style.color = CTYPE_COLORS[kind] || "var(--muted)";
        badge.removeAttribute("title"); // the hover popover replaces the native title
        badge.innerHTML = esc(kind) + connTipHtml(kind, connInfo.get(key));
      }
      // The on-hover debug popover for the connection pill: latency, both ICE
      // candidates, NAT-traversal hint, the open data channel, and the signaling
      // server. Pure detail readout — the same getStats the classifier already ran.
      function connTipHtml(kind, info) {
        const rows = [];
        if (info?.rttMs != null) rows.push(["latency", info.rttMs + " ms RTT"]);
        if (info?.remote) rows.push(["remote", info.remote]);
        if (info?.local) rows.push(["local", info.local]);
        if (info?.nat) rows.push(["nat", info.nat]);
        if (info?.dc) rows.push(["channel", info.dc]);
        if (info?.signaling) rows.push(["signal", info.signaling]);
        const head = `<div class="ctip-h">${esc(CTYPE_TIPS[kind] || kind)}</div>`;
        const body = rows
          .map(([k, v]) => `<div><span class="ctip-k">${k}</span>${esc(String(v))}</div>`)
          .join("");
        return `<span class="ctip">${head}${body || '<div class="ctip-k">probing…</div>'}</span>`;
      }
      // Candidate pairs aren't known the instant a peer connects (ICE keeps probing)
      // and can change (relay fallback); a light poll keeps every pill honest.
      setInterval(refreshConnKinds, 2500);

      // ---- live performance HUD (opt-in via the ⋯ menu, hidden by default) -----
      // Surfaces the metrics that actually move when the console feels laggy: render
      // fps, keystroke throughput (xterm onData), agent output rate (term.write),
      // and main-thread jank (long tasks). Counters accumulate over a 1s window;
      // the I/O hooks live in select() (perfNote on fwd / term.write).
      const perf = {
        frames: 0,
        inEvents: 0,
        inBytes: 0,
        outWrites: 0,
        outBytes: 0,
        jankMs: 0,
        echoMs: null,
      };
      let perfOn = false;
      let perfRaf = 0;
      // Keystroke→reflect latency: stamp the first un-echoed keystroke; the next
      // term.write that lands is its echo (the PTY round-trip). Accurate while
      // typing into an otherwise-quiet agent — the real UX number for a TUI.
      let pendingKeyTs = 0;
      function perfNote(kind, n) {
        if (!perfOn) return;
        if (kind === "in") {
          perf.inEvents++;
          perf.inBytes += n || 0;
          if (!pendingKeyTs) pendingKeyTs = performance.now();
        } else if (kind === "out") {
          perf.outWrites++;
          perf.outBytes += n || 0;
          if (pendingKeyTs) {
            perf.echoMs = Math.round(performance.now() - pendingKeyTs);
            pendingKeyTs = 0;
          }
        }
      }
      function perfReset() {
        perf.frames =
          perf.inEvents =
          perf.inBytes =
          perf.outWrites =
          perf.outBytes =
          perf.jankMs =
            0;
      }
      function perfFrameLoop() {
        if (!perfOn) {
          perfRaf = 0;
          return;
        }
        perf.frames++;
        perfRaf = requestAnimationFrame(perfFrameLoop);
      }
      try {
        // Long tasks fire regardless of the HUD; we only sum them while it's on.
        new PerformanceObserver((l) => {
          if (perfOn) for (const e of l.getEntries()) perf.jankMs += e.duration;
        }).observe({ entryTypes: ["longtask"] });
      } catch {
        /* longtask API unavailable (Safari) — jank line just stays 0 */
      }
      const fmtBytes = (b) => (b >= 1024 ? (b / 1024).toFixed(1) + " KB" : Math.round(b) + " B");
      setInterval(() => {
        const el = $("perfhud");
        if (!perfOn || !el) {
          perfReset();
          return;
        }
        const fps = perf.frames; // window is ~1s
        el.innerHTML =
          `<b>fps</b>   ${fps}\n` +
          `<b>echo</b>  ${perf.echoMs == null ? "—" : perf.echoMs + " ms"}\n` +
          `<b>keys</b>  ${perf.inEvents}/s  ${fmtBytes(perf.inBytes)}/s\n` +
          `<b>out</b>   ${perf.outWrites}/s  ${fmtBytes(perf.outBytes)}/s\n` +
          `<b>jank</b>  ${Math.round(perf.jankMs)} ms/s`;
        perfReset(); // note: echoMs is preserved (last keystroke round-trip stays shown)
      }, 1000);
      function setPerfHud(on) {
        perfOn = on;
        const el = $("perfhud");
        if (el) el.hidden = !on;
        const cb = $("perfToggle");
        if (cb) cb.checked = on;
        try {
          localStorage.setItem("ay.perfHud", on ? "1" : "0");
        } catch {}
        if (on) {
          perfReset();
          if (!perfRaf) perfRaf = requestAnimationFrame(perfFrameLoop);
          if (el) el.textContent = "measuring…";
        }
      }
      // Wire the ⋯ overflow menu and restore the saved HUD preference.
      // Recovery actions for the SELECTED agent, both confirmed first (destructive):
      //   Stop  — graceful: send the CLI's exit command (claude/codex /exit, gemini
      //           /quit) + Enter over the existing /api/send stdin wire. (Ctrl+C / Ctrl+C×2
      //           you can already just type — and some agents rely on that pattern — so
      //           we don't reinvent it here.)
      //   Force — escalation a stuck agent can't ignore: a real SIGKILL of its process
      //           GROUP, server-side via POST /api/kill. Use when /exit does nothing.
      const GRACEFUL_EXIT = { claude: "/exit", codex: "/exit", gemini: "/quit" };
      async function stopAgent(force) {
        const e = sel ? entries.find((x) => x._key === sel) : null;
        if (!e) return;
        const who = `pid ${e.pid} ${cliLabel(e) || ident(e) || ""}`.trim();
        const tx = txFor(e),
          kw = String(e.pid);
        if (force) {
          if (!confirm(`Force-kill (SIGKILL) ${who}?\nThis terminates the process immediately.`))
            return;
          tx.post("/api/kill", { keyword: kw }).catch(() => {});
          return;
        }
        const graceful = GRACEFUL_EXIT[e.cli] || "/exit";
        if (!confirm(`Stop ${who} — send "${graceful}"?`)) return;
        const send = (msg) =>
          tx.post("/api/send", { keyword: kw, msg, code: "none" }).catch(() => {});
        await send(graceful);
        await new Promise((r) => setTimeout(r, 200));
        await send("\r");
      }
      (function perfMenuBoot() {
        const btn = $("rmenubtn"),
          panel = $("rmenupanel"),
          cb = $("perfToggle");
        const closePanel = () => panel && (panel.hidden = true);
        if (btn && panel) {
          btn.addEventListener("click", (ev) => {
            ev.stopPropagation();
            panel.hidden = !panel.hidden;
          });
          document.addEventListener("click", (ev) => {
            if (!panel.hidden && !panel.contains(ev.target) && ev.target !== btn) closePanel();
          });
        }
        if (cb) cb.addEventListener("change", () => setPerfHud(cb.checked));
        $("stopAgent")?.addEventListener("click", () => (closePanel(), stopAgent(false)));
        $("killAgent")?.addEventListener("click", () => (closePanel(), stopAgent(true)));
        let saved = false;
        try {
          saved = localStorage.getItem("ay.perfHud") === "1";
        } catch {}
        setPerfHud(saved);
      })();

      // The local source is only worth polling when this page is actually backed
      // by an ay serve: localhost, or served by `ay serve --http` (which leaves a
      // token), or when there are no rooms to fall back on. On the public origin
      // with rooms, skip it so we don't hammer a 404 every poll.
      function ensureLocalSource() {
        const isLocalhost = ["localhost", "127.0.0.1", "[::1]"].includes(location.hostname);
        const hasToken = !!localStorage.getItem("ay.localToken");
        const enabled = isLocalhost || hasToken || Object.keys(loadRooms()).length === 0;
        if (enabled && !sources.has(LOCAL)) {
          const s = {
            id: LOCAL,
            host: "local",
            kind: "local",
            tx: localTx,
            client: null,
            live: false,
            tried: true, // no connect phase — polled directly
            devices: new Set(),
            serverCount: 0,
          };
          sources.set(LOCAL, s);
          subscribeSource(s);
        } else if (!enabled && sources.has(LOCAL)) {
          unsubscribeSource(sources.get(LOCAL));
          sources.delete(LOCAL);
        }
      }

      // Pull one source's agent list, tagging each row with its origin + a
      // composite key (pids can collide across rooms). Updates the source's live
      // flag, device set, and server count for the rooms panel.
      // Stamp a source's raw /api/ls records with their origin + composite key
      // (pids collide across rooms) and recompute the source's device set + server
      // count for the rooms panel. Pure transform of the source's current records.
      function stampAgents(s) {
        s.devices = new Set();
        const out = [...(s.byPid?.values() || [])].map((e) => {
          // codehost stamps _host per agent; agent-yes share rooms fall back to
          // the room's device label (from /api/whoami). Local stays unlabelled
          // (no deviceLabel) so a single-machine view keeps its clean path-only
          // identity instead of a blank "@:" prefix.
          const host = e._host || s.deviceLabel || "";
          if (host) s.devices.add(host);
          return { ...e, _room: s.id, _key: s.id + "#" + e.pid, _host: host };
        });
        s.serverCount =
          s.kind === "ch" ? s.client?.hosts().length || 0 : s.devices.size || (s.live ? 1 : 0);
        s.agents = out;
      }

      // Replace a source's whole record set (full /api/ls fetch or a stream
      // snapshot). Resets byPid so later stream deltas diff against it cleanly.
      function applyFull(s, arr) {
        s.byPid = new Map((Array.isArray(arr) ? arr : []).map((r) => [r.pid, r]));
        s.live = true;
        stampAgents(s);
      }

      // Apply one stream event: a full snapshot, or an incremental
      // { upsert:[changed], remove:[gone pids] } delta from /api/ls/subscribe.
      function applyDelta(s, ev) {
        if (ev.full) return applyFull(s, ev.upsert);
        if (!s.byPid) s.byPid = new Map();
        for (const r of ev.upsert || []) s.byPid.set(r.pid, r);
        for (const pid of ev.remove || []) s.byPid.delete(pid);
        s.live = true;
        stampAgents(s);
      }

      // Fallback poll for a source that isn't streaming (older host with no
      // /api/ls/subscribe, or before its first delta lands).
      async function listSource(s) {
        try {
          applyFull(s, await s.tx.fetchJSON("/api/ls?all=1"));
          return s.agents;
        } catch {
          s.live = false;
          s.serverCount = 0;
          s.byPid = new Map();
          s.agents = [];
          // A failed poll on an agent-yes room means the tunnel is unresponsive
          // (host gone/restarted) — the fastest, most reliable drop signal we get,
          // since WebRTC's own failed/closed state can lag 15-30s. Kick off the
          // backoff reconnect (no-op if one's already queued or the room's gone).
          if (s.kind === "rtc") scheduleRtcReconnect(s);
          return [];
        }
      }

      // Subscribe to a source's throttled delta stream instead of re-polling its
      // whole list. The first event flips `streaming` on, so the reconcile poll
      // skips this source — no duplicate full-list bytes on the wire. Older hosts
      // without the endpoint never send an event, so the poll keeps covering them.
      function subscribeSource(s) {
        if (!s.tx || s.unsub) return;
        s.unsub = s.tx.subscribe(
          "/api/ls/subscribe?all=1",
          (ev) => {
            if (!ev || typeof ev !== "object") return;
            s.streaming = true;
            applyDelta(s, ev);
            mergeRender();
          },
          null,
          () => {
            s.streaming = false;
          },
        );
      }
      function unsubscribeSource(s) {
        try {
          s.unsub?.();
        } catch {}
        s.unsub = null;
        s.streaming = false;
      }

      // Compact list: one line per agent (dot + cli + title), persisted per device.
      let compactList = localStorage.getItem("ay.compactList") === "1";

      // A small git chip (±changed ↑ahead ↓behind) for a row, amber when the tree
      // is dirty. Empty for clean/in-sync repos and non-git cwds — no noise.
      function gitChipHtml(e) {
        const label = gitLabel(e);
        if (!label) return "";
        const g = e.git || {};
        const tip = `git: ${g.changed || 0} changed · ${g.ahead || 0} ahead · ${g.behind || 0} behind`;
        return `<span class="git${g.dirty ? " dirty" : ""}" title="${esc(tip)}">${esc(label)}</span>`;
      }

      // Task-progress badge ("2/5") parsed from the agent's todo block, shown next
      // to the git chip. Amber-ish when all done; omitted entirely when no block.
      function taskChipHtml(e) {
        const label = taskLabel(e);
        if (!label) return "";
        const t = e.tasks || {};
        const allDone = t.total > 0 && t.done >= t.total;
        const tip = `tasks: ${t.done || 0} done / ${t.total || 0} total`;
        return `<span class="tasks${allDone ? " done" : ""}" title="${esc(tip)}">${esc(label)}</span>`;
      }

      // A room/peer group header row. Non-selectable; carries the same tree rails
      // as agent rows so the hierarchy reads as one tree. The room/peer layers
      // only appear here when there are ≥2 of them (single ones fold away in
      // layeredRows), so a header always disambiguates something real.
      function headerHtml(r) {
        const icon = r.kind === "room" ? "▤" : "▣";
        // Peer headers carry their host's connection type (lan/wan/relay), so a
        // mixed room shows at a glance which hosts are local vs reached over WAN.
        const ctag =
          r.kind === "peer"
            ? connTagHtml(hostKinds.get((r.room || "") + " " + (r.host || "")))
            : "";
        return `<div class="ghead g-${r.kind}">${r.branch ? `<span class="tbranch">${esc(r.branch)}</span>` : ""}<span class="gicon">${icon}</span><span class="glabel">${esc(r.label || "")}</span>${ctag}<span class="gkind">${r.kind}</span></div>`;
      }

      function renderList() {
        const toks = $("q").value.trim().split(/\s+/).filter(Boolean);
        // Build the full signalling-server > rooms > peers > agents > subagents
        // tree. Single-node room/peer layers fold away; ≥2 become ├ └ │ branches.
        const rows = layeredRows(entries.filter((e) => matches(e, toks)));
        const agentRows = rows.filter((r) => r.kind === "agent");
        $("count").textContent = `${agentRows.length} / ${entries.length} agents`;
        $("viewbtn").classList.toggle("on", compactList);
        // identContext blanks any field uniform across the shown list (so a
        // single-device fleet shows no device); multiDevice gates the detailed
        // host tag so it only appears when machines are actually mixed.
        const shownEntries = agentRows.map((r) => r.entry);
        const ctx = identContext(shownEntries);
        const multiDevice = deviceCount(shownEntries) > 1;
        if (compactList) {
          $("list").innerHTML =
            rows
              .map((r) => {
                if (r.kind !== "agent") return headerHtml(r);
                const e = r.entry;
                const t = e.title || e.prompt || "";
                const id = compactIdent(e, ctx, 3, r.parentEntry);
                const cli = cliLabel(e);
                return `<div class="row crow ${e._key === sel ? "sel" : ""}" data-key="${esc(e._key)}">
        ${r.branch ? `<span class="tbranch">${esc(r.branch)}</span>` : ""}
        <span class="dot ${esc(e.status)}"></span>
        ${hasIdent(id) ? `<span class="cident" title="${esc(fullIdent(e))}">${esc(id)}</span>` : ""}
        ${cli ? `<span class="cname">${esc(cli)}</span>` : ""}
        <span class="ctitle ${e.title ? "" : "dim"}" title="${esc(t)}">${esc(t)}</span>
        ${taskChipHtml(e)}
        ${gitChipHtml(e)}
        <span class="age">${age(e)}</span></div>`;
              })
              .join("") || `<div class="empty">no match</div>`;
          return;
        }
        $("list").innerHTML =
          rows
            .map((r) => {
              if (r.kind !== "agent") return headerHtml(r);
              const e = r.entry;
              // The host tag only earns its place when several machines are in
              // play AND it isn't already shown by a peer header above this row.
              const tags = tagsFor(e)
                .filter(([k]) => k !== "host" || multiDevice)
                .map(
                  ([k, v]) =>
                    `<span class="rtag" data-k="${k}"><span style="opacity:.55">${k}:</span>${esc(v)}</span>`,
                )
                .join("");
              return `<div class="row ${e._key === sel ? "sel" : ""}" data-key="${esc(e._key)}">
        <div class="r1">${r.branch ? `<span class="tbranch">${esc(r.branch)}</span>` : ""}<span class="dot ${esc(e.status)}"></span>
          <span class="name">${esc(cliLabel(e) || ident(e) || "agent")}</span>
          <span class="badge">pid ${e.pid}</span>
          ${taskChipHtml(e)}
          ${gitChipHtml(e)}
          <span class="age">${age(e)}</span></div>
        ${e.title ? `<div class="rowtitle" title="${esc(e.title)}">${esc(e.title)}</div>` : ""}
        ${e.prompt ? `<div class="detail" title="${esc(e.prompt)}">${esc(e.prompt)}</div>` : ""}
        <div class="rowtags">${tags}</div>
      </div>`;
            })
            .join("") || `<div class="empty">no match</div>`;
      }

      // Restore the last filter so a refresh (incl. the auto-reload on a new
      // deploy) doesn't wipe what you were narrowing to. Set before the first
      // render so the list comes up already filtered.
      try {
        const savedFilter = localStorage.getItem("ay.filter");
        if (savedFilter) $("q").value = savedFilter;
      } catch {}

      // A ?pid=<pid> in the URL (codehost.dev's agent chips link here) selects
      // that agent as soon as it shows up in the list, then forgets itself. With
      // no ?pid, fall back to the agent this device last had selected — so a
      // refresh lands you back on the same agent instead of the placeholder.
      // autoPidExplicit distinguishes the two: an explicit link opens the agent
      // even on mobile (it's a deliberate "take me here"), whereas a merely
      // restored selection only re-highlights the row on a phone — see loadList.
      let autoPid = new URLSearchParams(location.search).get("pid");
      let autoPidExplicit = !!autoPid;
      if (autoPid) {
        history.replaceState(null, document.title, location.pathname + location.hash);
      } else {
        try {
          autoPid = localStorage.getItem("ay.sel");
        } catch {}
      }

      // Match a stored/linked selection token against an entry: either the full
      // composite key (room#pid) or a bare pid (?pid= deep links, legacy ay.sel).
      const matchSel = (e, token) => e._key === token || String(e.pid) === String(token);

      // Reconcile poll: refresh only the sources that aren't streaming (older
      // hosts, or ones whose stream hasn't delivered its first snapshot yet) and
      // re-render. Streaming sources keep themselves current via subscribeSource,
      // so this stays a no-op on the wire for a modern fleet — it still re-renders
      // every tick, which keeps the relative "age" column fresh.
      async function loadList() {
        const srcs = [...sources.values()];
        await Promise.all(srcs.filter((s) => !s.streaming).map(listSource));
        mergeRender();
      }

      // Merge every source's stamped agents into the flat `entries` list, update
      // the connection badge + rooms panel, and re-render. Called after every poll
      // and every stream delta.
      function mergeRender() {
        const srcs = [...sources.values()];
        entries = srcs.flatMap((s) => s.agents || []);
        // Badge: total agents + how many rooms are live. Red only when nothing
        // at all is reachable (no source answered).
        const roomSrcs = srcs.filter((s) => s.id !== LOCAL);
        const liveRooms = roomSrcs.filter((s) => s.live).length;
        const anyLive = srcs.some((s) => s.live);
        const connecting = roomSrcs.some((s) => !s.tried);
        const n = entries.length;
        if (!srcs.length) {
          setConn("● no fleet", "var(--muted)");
        } else if (!anyLive) {
          if (connecting) setConn("● connecting…", "var(--amber)");
          else setConn(roomSrcs.length ? "● rooms offline" : "● ay serve down", "var(--red)");
        } else {
          const roomBit = liveRooms ? ` · ${liveRooms} room${liveRooms === 1 ? "" : "s"}` : "";
          setConn(`● ${n} agent${n === 1 ? "" : "s"}${roomBit}`, "var(--green)");
        }
        renderRoomsIfOpen();
        renderList();
        if (autoPid && entries.some((x) => matchSel(x, autoPid))) {
          const tok = autoPid;
          autoPid = null;
          const e = entries.find((x) => matchSel(x, tok));
          // On a phone, a restored selection re-highlights the row but stays on
          // the list — opening it would flip straight into the full-screen
          // terminal (show-detail) and hide the list. An explicit ?pid= link is
          // a deliberate jump, so it still opens. Desktop shows both panes, so
          // there's nothing to scope — always open.
          if (autoPidExplicit || window.innerWidth > 720) {
            select(e._key);
          } else {
            sel = e._key;
            renderList();
          }
        }
      }

      function select(keyOrPid) {
        const e =
          entries.find((x) => x._key === keyOrPid) ||
          entries.find((x) => String(x.pid) === String(keyOrPid));
        if (!e) {
          sel = String(keyOrPid);
          return;
        }
        sel = e._key;
        paintHeaderBadge();
        // Remember the selection so a refresh re-opens this agent (see boot/autoPid).
        try {
          localStorage.setItem("ay.sel", sel);
        } catch {}
        // Reflect it in the URL hash as #room:pid. The fragment is never sent in
        // any request, so — unlike the old ?pid= query that landed in the server's
