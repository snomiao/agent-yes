        // access logs — the agent id stays client-side, while still surviving a
        // refresh and being copy-pasteable as a deep link.
        try {
          const want = "#" + e._room + ":" + e.pid;
          if (location.hash !== want)
            history.replaceState(null, document.title, location.pathname + want);
        } catch {}
        // pid + tx are how we talk to the agent's own host; sel (composite) is
        // only for UI identity/highlight, since pids can collide across rooms.
        const pid = e.pid;
        const tx = txFor(e);
        renderList();
        // Mobile: flip the single-column layout to the terminal ("detail") pane.
        // Done BEFORE term.open below so xterm measures a visible container.
        document.querySelector(".app").classList.add("show-detail");
        $("rhead").style.display = "flex";
        $("rdot").className = "dot " + e.status;
        $("rname").textContent = e.title || cliLabel(e) || ident(e) || "agent";
        $("rpid").textContent = "pid " + e.pid;

        // Render the agent's native TUI with xterm.js by feeding it the raw PTY
        // stream (ANSI/cursor control intact) — see /api/tail?raw=1.
        if (es) es.close();
        if (term) {
          term.dispose();
          term = null;
        }
        const logEl = $("log");
        logEl.innerHTML = "";
        term = new Terminal({
          convertEol: false,
          disableStdin: false,
          cursorBlink: true,
          scrollback: 5000,
          fontSize: 12,
          fontFamily: 'ui-monospace, "SF Mono", Menlo, monospace',
          theme: termTheme(),
        });
        fit = new FitAddon.FitAddon();
        term.loadAddon(fit);
        // Make plain URLs in the output clickable. Agents that emit OSC 8
        // hyperlinks already get clickable text, but most output is bare URLs —
        // this addon scans the rendered buffer and links them too. Click opens a
        // new tab (noopener so the page can't be tampered with via window.opener).
        try {
          term.loadAddon(
            new WebLinksAddon.WebLinksAddon((e, uri) =>
              window.open(uri, "_blank", "noopener,noreferrer"),
            ),
          );
        } catch {
          /* addon CDN blocked — terminal still works, just without auto-links */
        }
        term.open(logEl);
        // On a phone, auto-focusing yanks up the soft keyboard the moment you open
        // an agent — even when you only meant to read the tail. Skip it there; a tap
        // on the terminal still focuses to type. Desktop keeps instant keyboard input.
        if (window.innerWidth > 720) term.focus();
        // An agent can rename itself by emitting an OSC 0/2 title sequence
        // (\x1b]2;my-name\x07); xterm parses it out of the raw PTY stream we already
        // feed it, so we just surface the latest title as the header name. Falls
        // back to the cli name when the agent never sets one.
        term.onTitleChange((t) => {
          const title = t && t.trim();
          if (sel !== e._key || !title) return;
          $("rname").textContent = title;
          // Keep the left panel in lockstep with the terminal header. The row
          // title otherwise only refreshes on the 3s /api/ls poll, so it visibly
          // lagged the live terminal. Patch the current entry (entries is
          // replaced wholesale each poll, so look it up by _key, not via the
          // captured `e`) and re-render — but only when the title actually
          // changed, so a TUI re-emitting the same OSC doesn't churn the list.
          const ent = entries.find((x) => x._key === e._key);
          if (ent && ent.title !== title) {
            ent.title = title;
            renderList();
          }
        });
        // Adapt: drive the agent's PTY to the browser terminal size (POST
        // /api/resize → winsize + SIGWINCH) so its TUI reflows to match what we
        // render. Suppressed during the initial fit below, which does its own
        // one-shot "push only if the agent is out of sync" check.
        let suppressPush = true;
        const pushSize = () => {
          if (term && sel === e._key && !suppressPush)
            tx.post("/api/resize/" + encodeURIComponent(pid), {
              cols: term.cols,
              rows: term.rows,
            }).catch(() => {});
        };
        term.onResize(pushSize);
        // Forward everything the terminal emits to the agent stdin (raw, no
        // trailing Enter): keystrokes, paste, and — when a TUI enables mouse
        // tracking — click / drag-motion / wheel as SGR mouse reports. onBinary
        // covers the UTF-8 mouse encoding (DECSET 1005). Verified end-to-end:
        // a drag emits \x1b[<0;..M / \x1b[<32;..M / \x1b[<0;..m, wheel \x1b[<64/65..M.
        // keyword MUST be a string — ay serve's POST /api/send rejects a numeric
        // keyword with 400 (pid arrives as a number from /api/ls JSON).
        const kw = String(pid);
        const fwd = (d) => {
          if (sel === e._key) {
            perfNote("in", typeof d === "string" ? d.length : (d?.byteLength ?? 0));
            tx.post("/api/send", { keyword: kw, msg: d, code: "none" }).catch(() => {});
          }
        };
        term.onData(fwd);
        term.onBinary(fwd);
        // On switch, render at OUR pane size and make the agent match it: fit
        // xterm to the viewport, then — if the agent's PTY winsize differs from
        // what we're now rendering — push a resize so its TUI reflows to fill the
        // pane. The agent may have been sized by a different viewer/terminal, or
        // our window changed while this agent was in the background; either way a
        // mismatch leaves the TUI clipped or boxed-in until something nudges it.
        // Only push when it actually differs, so an already-matching agent isn't
        // poked with a redundant SIGWINCH. After this, live window resizes push
        // automatically (suppressPush flips off).
        const selKey = e._key;
        const fitAndSync = (sz) => {
          if (sel !== selKey || !term) return;
          try {
            fit.fit();
          } catch {}
          if (!sz || sz.cols !== term.cols || sz.rows !== term.rows) {
            tx.post("/api/resize/" + encodeURIComponent(pid), {
              cols: term.cols,
              rows: term.rows,
            }).catch(() => {});
          }
          suppressPush = false;
        };
        tx.fetchJSON("/api/size/" + encodeURIComponent(pid))
          .then(fitAndSync)
          .catch(() => fitAndSync(null));

        // True live tail via ay serve's SSE stream. First event is an xterm-rendered
        // tail snapshot; later events are incremental deltas. We normalise terminal
        // carriage returns so the stream reads cleanly as HTML, autoscroll while the
        // viewer is pinned to the bottom, and cap the buffer so it can't grow forever.
        $("livedot").className = "dot idle";
        $("livetxt").textContent = "connecting…";
        const close = tx.subscribe(
          "/api/tail/" + encodeURIComponent(pid) + "?raw=1",
          (raw) => {
            if (term) {
              term.write(raw);
              perfNote("out", raw?.length ?? 0);
            }
          },
          () => {
            $("livedot").className = "dot active";
            $("livetxt").textContent = "live";
          },
          () => {
            $("livedot").className = "dot stopped";
            $("livetxt").textContent = "disconnected";
          },
        );
        es = { close };
      }

      $("list").addEventListener("click", (ev) => {
        const row = ev.target.closest(".row");
        if (row) select(row.dataset.key);
      });
      // Mobile back button: return to the list pane. The tail keeps streaming in the
      // background (selection unchanged), so reopening the agent is instant.
      $("rback").addEventListener("click", () => {
        document.querySelector(".app").classList.remove("show-detail");
      });
      $("q").addEventListener("input", () => {
        try {
          localStorage.setItem("ay.filter", $("q").value);
        } catch {}
        renderList();
      });
      $("viewbtn").addEventListener("click", () => {
        compactList = !compactList;
        localStorage.setItem("ay.compactList", compactList ? "1" : "0");
        renderList();
      });
      window.addEventListener("resize", () => {
        if (fit)
          try {
            fit.fit();
          } catch {}
      });

      // Step the selection up/down the (filtered) list — same order the left panel
      // renders. Clamps at the ends, scrolls the row into view.
      function stepSelection(dir) {
        const toks = $("q").value.trim().split(/\s+/).filter(Boolean);
        // Must match renderList's order; step only over agent rows (skip headers).
        const shown = layeredRows(entries.filter((e) => matches(e, toks)))
          .filter((r) => r.kind === "agent")
          .map((r) => r.entry);
        if (!shown.length) return;
        const cur = shown.findIndex((e) => e._key === sel);
        const next = shown[nextIndex(shown.length, cur, dir)];
        select(next._key);
        const row = $("list").querySelector('.row[data-key="' + CSS.escape(next._key) + '"]');
        if (row) row.scrollIntoView({ block: "nearest" });
      }
      // Cmd+ArrowDown/Up (Mac) or Alt+ArrowDown/Up (Windows/Linux) cycles agents.
      // The modifier differs per-OS because horizontal arrows mean "go forward/back":
      // Mac uses Cmd+Left/Right for that, Windows/Linux use Alt+Left/Right — so we
      // pick the platform's own modifier for the vertical agent-switch combo.
      // Capture phase on window so it fires BEFORE xterm's textarea handler —
      // stopPropagation then keeps the combo from being forwarded to the focused
      // agent's PTY as keystrokes.
      const IS_MAC = /Mac|iPhone|iPad|iPod/i.test(navigator.platform || navigator.userAgent || "");
      window.addEventListener(
        "keydown",
        (e) => {
          const mod = IS_MAC ? e.metaKey : e.altKey;
          if (!mod || (e.key !== "ArrowDown" && e.key !== "ArrowUp")) return;
          e.preventDefault();
          e.stopPropagation();
          stepSelection(e.key === "ArrowDown" ? 1 : -1);
        },
        true,
      );

      // ---- rooms: localStorage cache + a manager you open by clicking the badge ----
      const ROOMS_KEY = "ay.rooms";
      const ROOM_TTL_MS = 90 * 24 * 60 * 60 * 1000; // evict stale rooms to bound how long a secret lingers in localStorage
      const loadRooms = () => {
        try {
          const r = JSON.parse(localStorage.getItem(ROOMS_KEY) || "{}");
          const now = Date.now();
          let changed = false;
          for (const k of Object.keys(r)) {
            if (r[k]?.ts && now - r[k].ts > ROOM_TTL_MS) {
              delete r[k];
              changed = true;
            }
          }
          if (changed) localStorage.setItem(ROOMS_KEY, JSON.stringify(r));
          return r;
        } catch {
          return {};
        }
      };
      const saveRoom = (room, token, host) => {
        const r = loadRooms();
        r[room] = { token, host: host || SIG_DEFAULT, ts: Date.now() };
        localStorage.setItem(ROOMS_KEY, JSON.stringify(r));
      };
      const dropRoom = (room) => {
        const r = loadRooms();
        delete r[room];
        localStorage.setItem(ROOMS_KEY, JSON.stringify(r));
      };
      function setConn(text, color) {
        $("conn").textContent = text;
        $("conn").style.color = color;
      }

      // codehost rooms ride the same saved-rooms cache, discriminated by the
      // sentinel host "codehost". The token is a bearer secret — never render
      // it; display a short FNV-1a mnemonic instead (mirrors codehost.dev).
      const CH_HOST = "codehost";
      function chName(token) {
        let h = 0x811c9dc5;
        for (let i = 0; i < token.length; i++) {
          h ^= token.charCodeAt(i);
          h = Math.imul(h, 0x01000193);
        }
        return "ch-" + (h >>> 0).toString(36).slice(0, 4).padStart(4, "0");
      }

      function removeSource(room) {
        const s = sources.get(room);
        if (!s) return;
        s.removed = true; // stop any pending exp-backoff reconnect (see below)
        clearTimeout(s.reconnectTimer);
        unsubscribeSource(s);
        try {
          s.client?.close?.();
          s.client?.pc?.close?.();
        } catch {}
        sources.delete(room);
      }

      // Exponential-backoff reconnect for an agent-yes share room (the RTCClient
      // wire). codehost rooms already self-heal via room-client.js; the agent-yes
      // viewer was one-shot, so a dropped DataChannel (e.g. the host restarting)
      // left the room dead until a manual reload. Retry with jittered backoff
      // until the room is forgotten.
      const RTC_BACKOFF_MIN = 1000,
        RTC_BACKOFF_MAX = 30000;
      async function connectRtcSource(s) {
        s.reconnecting = true; // block overlapping attempts while this one is in flight
        try {
          // Detach the stale peer's onstate BEFORE closing it — otherwise its own
          // "closed" event schedules another reconnect mid-replace, and that timer
          // fires after we've already recovered, churning a healthy channel forever.
          if (s.client) s.client.onstate = () => {};
          // The delta stream died silently with the old client (RTCClient never
          // fires onError), leaving s.streaming=true and s.unsub set — which would
          // make the reconcile poll skip this source AND block re-subscription.
          // Clear it so the fresh transport below re-establishes the stream.
          unsubscribeSource(s);
          try {
            s.client?.close?.(); // drop the stale peer AND its signaling socket
          } catch {}
          const c = new RTCClient(s.host, s.id, s.token);
          c.onstate = (st) => {
            if (st === "failed" || st === "closed") {
              s.live = false;
              renderRoomsIfOpen();
              scheduleRtcReconnect(s); // "disconnected" is transient; ignore it
            }
          };
          try {
            await c.connect();
          } catch (e) {
            c.close(); // connect() already opened the signaling socket — don't
            throw e; //  leak it on every failed retry of an offline room
          }
          if (s.removed) {
            c.close(); // room was forgotten mid-connect — don't install/leak it
            return;
          }
          s.client = c;
          s.tx = rtcTx(c);
          s.reconnectDelay = RTC_BACKOFF_MIN; // a healthy connect resets the backoff
          clearTimeout(s.reconnectTimer); // cancel any reconnect queued during replace
          s.reconnectTimer = null;
          subscribeSource(s); // re-establish the live delta stream over the new wire
          // agent-yes share (unlike codehost) sends no per-agent device id, so
          // every machine's rows would be unlabelled. Ask the host who it is once
          // and tag this room's agents with it in listSource. Best-effort: an older
          // host with no /api/whoami just leaves rows device-less.
          try {
            s.deviceLabel = (await s.tx.fetchJSON("/api/whoami"))?.host || "";
            // whoami resolves after the first listSource may have already rendered
            // this room's rows device-less (and activity-gated polling might not
            // re-fire soon on a backgrounded tab). Re-render now so the host label
            // lands immediately instead of lagging a poll.
            if (s.deviceLabel) loadList();
          } catch {
            s.deviceLabel = "";
          }
        } finally {
          s.reconnecting = false;
        }
      }
      function scheduleRtcReconnect(s) {
        // forgotten, already queued, or a connect is already in flight
        if (s.removed || s.reconnectTimer || s.reconnecting) return;
        const base = s.reconnectDelay || RTC_BACKOFF_MIN;
        const delay = Math.round(base * (0.75 + Math.random() * 0.5)); // jitter
        s.reconnectDelay = Math.min(base * 2, RTC_BACKOFF_MAX);
        s.reconnectTimer = setTimeout(async () => {
          s.reconnectTimer = null;
          if (s.removed || s.reconnecting) return;
          try {
            await connectRtcSource(s);
            s.live = true;
            renderRoomsIfOpen();
            // Await the refresh: a prior failed poll cleared `entries`, so select()
            // below would find nothing and skip the rebind until the list is back.
            await loadList();
            // A terminal opened before the drop still holds the dead tx (its tail
            // subscription + send closures). Re-select to rebind it to the new
            // transport, else the room looks live but the terminal stays frozen.
            if (sel && sel.startsWith(s.id + "#")) select(sel);
          } catch {
            s.live = false;
            scheduleRtcReconnect(s); // keep trying
          }
        }, delay);
      }

      // Add a room to the fleet and connect it — WITHOUT dropping the others, so
      // every saved room streams its agents at once. Idempotent: a room already
      // in the fleet just refreshes. The connection runs in the background; the
      // next poll picks up its agents once the tunnel is open.
      async function addRoomSource(room, token, host) {
        host = host || SIG_DEFAULT;
        saveRoom(room, token, host); // cache so the badge can list & reconnect later
        if (sources.has(room)) return;
        const s = {
          id: room,
          host,
          kind: host === CH_HOST ? "ch" : "rtc",
          tx: null,
          client: null,
          live: false,
          tried: false,
          devices: new Set(),
          serverCount: 0,
        };
        sources.set(room, s);
        renderRoomsIfOpen();
        try {
          if (host === CH_HOST) {
            const c = new CodehostClient(token);
            c.onstate = (st) => {
              if (st === "closed") {
                s.live = false;
                renderRoomsIfOpen();
              }
            };
            await c.connect();
            s.client = c;
            s.tx = c;
          } else {
            s.token = token;
            await connectRtcSource(s);
          }
          s.live = true;
        } catch (e) {
          s.live = false;
          if (s.kind === "rtc") scheduleRtcReconnect(s);
        }
        s.tried = true;
        renderRoomsIfOpen();
        if (s.live) subscribeSource(s);
        loadList();
      }

      // Connect to every saved room at once (called on boot).
      function connectAllRooms() {
        const r = loadRooms();
        for (const name of Object.keys(r)) addRoomSource(name, r[name].token, r[name].host);
      }

      // Back-compat alias: a freshly pasted/linked room is added like any other.
      const connectRoom = (room, token, host) => addRoomSource(room, token, host);

      function parseRoomInput(s) {
        s = s.trim();
        const hash = s.indexOf("#");
        if (hash >= 0) s = s.slice(hash + 1);
        s = decodeURIComponent(s);
        // codehost rooms: "ch:<room-token>" or a codehost.dev share link ("…#t=<token>").
        if (s.startsWith("ch:") || s.startsWith("t=")) {
          const token = (s.startsWith("ch:") ? s.slice(3) : s.slice(2)).trim();
          return token ? { room: chName(token), token, host: CH_HOST } : null;
        }
        const m = /^([A-Za-z0-9_-]+):([^@\s]+)(?:@(.+))?$/.exec(s);
        return m ? { room: m[1], token: m[2], host: m[3] } : null;
      }

      // Re-render the rooms panel only if it's currently open (so live-count
      // updates from connect/poll land without forcing it open).
      function renderRoomsIfOpen() {
        if ($("rooms").style.display !== "none") renderRooms();
      }

      // A room's live state: a room is reachable whenever we can join its
      // signaling server, so "live" really means "how many serving machines are
      // in it right now". The signaling layer can't tell us the count until we've
      // connected, so we show the source's last-known serverCount.
      function roomStatus(n) {
        const s = sources.get(n);
        if (!s) return `<span class="rstat off">○</span>`;
        if (!s.live) return `<span class="rstat off" title="offline">○</span>`;
        const c = s.serverCount;
        return `<span class="rstat on" title="${c} live ${c === 1 ? "server" : "servers"}">● ${c}</span>`;
      }

      function renderRooms() {
        const r = loadRooms();
        const names = Object.keys(r).sort((a, b) => r[b].ts - r[a].ts);
        const items = names.length
          ? names
              .map(
                (n) => `<div class="ritem ${sources.get(n)?.live ? "cur" : ""}">
          ${roomStatus(n)}
          <span class="rname" data-room="${esc(n)}">${esc(n)}</span>
          <span class="rhost">${esc(r[n].host)}</span>
          <span class="rx" data-del="${esc(n)}" title="forget">✕</span></div>`,
              )
              .join("")
          : `<div class="empty2">no saved rooms — paste a share link below</div>`;
        $("rooms").innerHTML = `<div class="rtitle">rooms · stored on this device</div>${items}
      <div class="radd"><input id="roomin" placeholder="room:token  or  https://…/#room:token" /><button id="roomadd">add</button></div>
      <div class="rconnect">new here? install agent-yes (bun or npm, auto):
        <code id="cmdinstall" class="copy" title="click to copy">curl -fsSL https://agent-yes.com/setup.sh | sh</code>
        <span style="opacity:.6">Windows:</span>
        <code id="cmdinstallwin" class="copy" title="click to copy">powershell -c "irm https://agent-yes.com/setup.ps1 | iex"</code></div>
      <div class="rconnect">share your own fleet — run this, then open the printed link:
        <code id="cmd" class="copy" title="click to copy">ay serve --share</code></div>
      <div class="rconnect">or view a <b>codehost</b> room — paste <code>ch:&lt;room-token&gt;</code> (or a
        codehost.dev share link) above; every machine in the room shows its agents here.</div>`;
      }

      $("conn").addEventListener("click", () => {
        const el = $("rooms");
        if (el.style.display === "none") {
          renderRooms();
          el.style.display = "block";
          $("roomin")?.focus();
        } else el.style.display = "none";
      });
      $("rooms").addEventListener("click", (ev) => {
        const name = ev.target.closest(".rname");
        if (name) {
          // Rooms are all connected at once now; clicking one filters the list to
          // it (and re-adds it if it was forgotten/offline), rather than switching.
          const r = loadRooms()[name.dataset.room];
          if (r) {
            connectRoom(name.dataset.room, r.token, r.host);
            $("q").value = "room:" + name.dataset.room;
            try {
              localStorage.setItem("ay.filter", $("q").value);
            } catch {}
            renderList();
            $("rooms").style.display = "none";
          }
          return;
        }
        const del = ev.target.closest(".rx");
        if (del) {
          removeSource(del.dataset.del);
          dropRoom(del.dataset.del);
          renderRooms();
          loadList();
          return;
        }
        if (ev.target.id === "roomadd") {
          const p = parseRoomInput($("roomin").value);
          if (p) {
            connectRoom(p.room, p.token, p.host);
            $("rooms").style.display = "none";
          } else alert("expected  room:token  or a share link");
        }
      });

      // Click-to-copy for any <code class="copy"> (install one-liners, share cmd…),
      // wherever it lives — header or the rooms panel.
      document.addEventListener("click", (ev) => {
        const c = ev.target.closest && ev.target.closest("code.copy");
        if (!c) return;
        navigator.clipboard?.writeText(c.textContent).then(() => {
          const o = c.textContent;
          c.textContent = "copied ✓";
          setTimeout(() => {
            c.textContent = o;
          }, 1000);
        });
      });

      // ---- launch: command-only URLs (#launch=<json>, NO token) ----
      // The link carries only WHAT to run; the capability to run it is the viewer's
      // own connected fleet (cached room) + a y/N confirm on that host. So a public
      // launch link can never spawn on a machine the clicker doesn't already control.
      function showLaunch(spec) {
        const rooms = loadRooms();
        const names = Object.keys(rooms).sort((a, b) => rooms[b].ts - rooms[a].ts);
        const cmd = "ay " + (spec.cli || "claude") + (spec.prompt ? ` -- "${spec.prompt}"` : "");
        const fleets = names.length
          ? `<div class="lfleets">${names.map((n) => `<button class="lfleet" data-room="${esc(n)}">▷ ${esc(n)}</button>`).join("")}</div>
         <div class="lhint">pick a fleet to run on</div>`
          : `<div class="lwarn">No connected fleet on this device. Run <code>bunx agent-yes serve --share</code>, open its link once, then reopen this launch link.</div>`;
        $("launch").innerHTML = `<div class="lcard">
      <div class="ltitle">Launch agent</div>
      <div class="lcmd">${esc(cmd)}</div>
      <div class="lcwd">cwd: ${esc(spec.cwd || "(host default)")}</div>
      ${fleets}
      <button class="lcancel">cancel</button></div>`;
        $("launch").dataset.spec = JSON.stringify(spec);
        $("launch").style.display = "flex";
      }

      // Pick the fleet to spawn on: an explicit roomId, else the selected agent's
      // source, else local, else any live source.
      function spawnTarget(roomId) {
        return (
          sources.get(roomId) ||
          srcFor(entries.find((e) => e._key === sel)) ||
          sources.get(LOCAL) ||
          [...sources.values()].find((s) => s.live) ||
          [...sources.values()][0] ||
          null
        );
      }

      // Spawn a new agent on the chosen fleet and select it once it registers.
      // Shared by the launch-URL flow and the "+ New agent" button. Returns false
      // on a spawn error (the alert is already shown), true otherwise.
      async function spawnAndSelect(spec, roomId) {
        await loadList();
        const target = spawnTarget(roomId);
        if (!target) {
          alert("no fleet to launch on — connect a room or run `ay serve` locally");
          return false;
        }
        // Match by "newest agent that wasn't here before" ON THIS fleet — the
        // spawn returns the wrapper pid, but the agent registers under its own.
        const before = new Set(entries.filter((e) => e._room === target.id).map((e) => e.pid));
        const res = await target.tx.post("/api/spawn", {
          cli: spec.cli || "claude",
          cwd: spec.cwd || undefined,
          prompt: spec.prompt || undefined,
        });
        if (!res.ok) {
          alert("launch failed: " + res.text);
          return false;
        }
        for (let i = 0; i < 14; i++) {
          await loadList();
          const fresh = entries
            .filter((e) => e._room === target.id && !before.has(e.pid))
            .sort((a, b) => (b.started_at || 0) - (a.started_at || 0));
          if (fresh.length) {
            select(fresh[0]._key);
            return true;
          }
          await new Promise((r) => setTimeout(r, 800));
        }
        return true;
      }

      async function launchOn(room, spec) {
        const r = loadRooms()[room];
        if (!r) return;
        $("launch").style.display = "none";
        await connectRoom(room, r.token, r.host);
        await spawnAndSelect(spec, room);
      }

      $("launch").addEventListener("click", (ev) => {
        const f = ev.target.closest(".lfleet");
        if (f) {
          launchOn(f.dataset.room, JSON.parse($("launch").dataset.spec));
          return;
        }
        if (ev.target.closest(".lcancel")) $("launch").style.display = "none";
      });

      // ---- "+ New agent": a spawn form for the CURRENTLY connected fleet ----
      // Click → fill (cli defaults to claude, cwd prefilled from the selected agent
      // when there is one, prompt optional) → POST /api/spawn on this connection.
      // Always allowed: the console already controls every running agent's stdin.
      function showNew() {
        const here = entries.find((x) => x._key === sel);
        const cwd = here?.cwd || "";
        const target = spawnTarget();
        const where = target ? (target.id === LOCAL ? "local" : target.id) : "local";
        $("newform").dataset.room = target ? target.id : "";
        $("newform").innerHTML = `<div class="lcard">
      <div class="ltitle">New agent · ${esc(where)}</div>
      <div class="nfield"><label>CLI</label><input id="nf-cli" value="claude" spellcheck="false" autocapitalize="off" /></div>
      <div class="nfield"><label>Working dir</label><input id="nf-cwd" value="${esc(cwd)}" placeholder="(host default)" spellcheck="false" autocapitalize="off" /></div>
      <div class="nfield"><label>Prompt — optional</label><textarea id="nf-prompt" rows="3" placeholder="initial message to send the agent…"></textarea></div>
      <div class="lrow">
        <button class="lfleet" id="nf-go">▷ Launch</button>
        <button class="lcancel" id="nf-cancel">cancel</button>
      </div>
      <div class="lhint">POST /api/spawn on this fleet. ⌘/Ctrl+Enter to launch.</div></div>`;
        $("newform").style.display = "flex";
        setTimeout(() => $("nf-prompt")?.focus(), 0);
      }

      async function submitNew() {
        const go = $("nf-go");
        if (!go || go.disabled) return;
        const spec = {
          cli: ($("nf-cli").value || "claude").trim(),
          cwd: $("nf-cwd").value.trim(),
          prompt: $("nf-prompt").value,
        };
        const room = $("newform").dataset.room || undefined;
        // Warn (but allow) when an agent is already running in this cwd on the
        // target fleet. A 2nd `claude -c` in the same repo fights over the same
        // session/files and usually exits on startup — which looks like "the new
        // agent never appears". Let the user pick a different dir or proceed.
        if (spec.cwd) {
          await loadList();
          const norm = (p) => (p || "").replace(/\/+$/, "");
          const busy = entries.some(
            (e) =>
              (room ? e._room === room : true) &&
              e.exit_code == null &&
              norm(e.cwd) === norm(spec.cwd),
          );
          if (
            busy &&
            !confirm(
              `An agent is already running in:\n${spec.cwd}\n\n` +
                `Launching another in the same repo can collide (shared session/files) ` +
                `and the new one may exit immediately. Launch anyway?`,
            )
          )
            return;
        }
        go.disabled = true;
        go.textContent = "launching…";
        const ok = await spawnAndSelect(spec, room);
        if (ok) {
          $("newform").style.display = "none";
        } else {
          go.disabled = false;
          go.textContent = "▷ Launch";
        }
      }

      $("newbtn").addEventListener("click", showNew);
      $("newform").addEventListener("click", (ev) => {
        if (ev.target.id === "nf-go") submitNew();
        else if (ev.target.id === "nf-cancel" || ev.target === $("newform"))
          $("newform").style.display = "none";
      });
      $("newform").addEventListener("keydown", (ev) => {
        if (ev.key === "Escape") $("newform").style.display = "none";
        else if (ev.key === "Enter" && (ev.metaKey || ev.ctrlKey)) {
          ev.preventDefault();
          submitNew();
        }
      });

      // boot: a launch URL opens the launcher; otherwise connect from the hash (then
      // eat the token); a bare #room reconnects from the cached token; else local.
      async function boot() {
        ensureLocalSource();
        const raw = location.hash.replace(/^#/, "");
        if (raw.startsWith("launch=")) {
          let spec = null;
          try {
            spec = JSON.parse(decodeURIComponent(raw.slice(7)));
          } catch {}
          history.replaceState(null, document.title, location.pathname + location.search); // eat launch params
          if (spec) showLaunch(spec);
          startPolling();
          connectAllRooms();
          return;
        }
        // #k=<token> — local-mode auth from `ay serve --http`'s printed link.
        // Store it and stay local (don't fall through to the saved-room reconnect).
        if (raw.startsWith("k=")) {
          try {
            localStorage.setItem("ay.localToken", decodeURIComponent(raw.slice(2)));
          } catch {}
          // SECURITY: strip the token from the URL immediately.
          history.replaceState(null, document.title, location.pathname + location.search);
          ensureLocalSource();
          startPolling();
          connectAllRooms();
          return;
        }
        const h = decodeURIComponent(raw);
        let pending = null;
        // codehost rooms first — the generic room:token regex below would
        // otherwise eat "ch:<token>" as room "ch".
        if (h.startsWith("ch:") || h.startsWith("t=")) {
          const p = parseRoomInput(h);
          if (p) {
            // SECURITY: strip the bearer token from the URL immediately.
            history.replaceState(
              null,
              document.title,
              location.pathname + location.search + "#" + p.room,
            );
            pending = p;
          }
        }
        const full = pending ? null : /^([A-Za-z0-9_-]+):([^@]+)(?:@(.+))?$/.exec(h);
        const bare = /^([A-Za-z0-9_-]+)$/.exec(h);
        // Treat the colon form as #room:agentId only when there's no @host, the id
        // is a bare pid (digits), AND we can actually reconnect that room (it's
        // cached or local). Otherwise the second part must be the token we need to
        // connect — so a fresh browser still honours #room:token even when the token
        // is custom and happens to be all digits.
        // …and bounded to a plausible pid width (≤7 digits) so a long numeric
        // custom token can't be mistaken for an agent id. A returning user's room
        // token is persisted, so even a short numeric token reconnects fine from
        // cache; only the share-link form needs the token, which stays uneaten.
        const aidLike =
          full &&
          !full[3] &&
          !/^e\d/i.test(full[2]) && // an e<N>. version marker is always a secret, never an agent id
          /^\d{1,7}$/.test(full[2]) &&
          (full[1] === LOCAL || !!loadRooms()[full[1]]);
        if (full && !aidLike) {
          // #room:token — a share link. Connect, then eat the token so only #room
          // lingers.
          const [, room, token, host] = full;
          // SECURITY: strip the token from the URL immediately so it never lingers in
          // the omnibox, history, or a screenshot. Keep only the room mnemonic.
          history.replaceState(
            null,
            document.title,
            location.pathname + location.search + "#" + room,
          );
          pending = { room, token, host };
        } else if (full) {
          // #room:agentId — a deep link to one agent in a (cached) room. The id is
          // not a secret, so it stays in the hash; reconnect the room from its
          // cached token and select the agent once it streams in. autoPid uses the
          // composite key so it picks the right host when pids collide across rooms.
          const [, room, aid] = full;
          autoPid = room + "#" + aid;
          autoPidExplicit = true;
          const r = loadRooms()[room];
          if (r) pending = { room, token: r.token, host: r.host };
        } else if (bare && loadRooms()[bare[1]]) {
          const r = loadRooms()[bare[1]];
          pending = { room: bare[1], token: r.token, host: r.host };
        }
        // Render the UI immediately and refresh on a timer; connect to every
        // saved room in the BACKGROUND so a dead/slow room never blanks the page,
        // and they all stream their agents into one list at once.
        startPolling();
        if (pending) connectRoom(pending.room, pending.token, pending.host);
        connectAllRooms();
      }

      // ---- activity-gated polling + auto-reload on new deploy ----------------
      // Poll the agent list while the page is actually in use; pause when the tab
      // is hidden or the user has been idle for IDLE_MS, so an unattended console
      // stops making requests. On returning to the tab we refresh immediately.
      let lastActivity = Date.now();
      const IDLE_MS = 60_000; // no interaction for 1 min → idle → stop polling
      ["mousemove", "keydown", "pointerdown", "wheel", "touchstart"].forEach((ev) =>
        window.addEventListener(ev, () => (lastActivity = Date.now()), { passive: true }),
      );
      const isActive = () =>
        document.visibilityState === "visible" && Date.now() - lastActivity < IDLE_MS;

      let polling = false;
      function startPolling() {
        if (polling) return;
        polling = true;
        loadList();
        setInterval(() => {
          if (isActive()) loadList();
        }, 3000); // refresh statuses / new agents — only while active
        document.addEventListener("visibilitychange", () => {
          if (document.visibilityState === "visible") {
            lastActivity = Date.now();
            loadList();
          }
        });
        watchVersion();
      }

      // Auto-reload when the console's own assets change (a new deploy). We'd
      // prefer to compare a cheap HEAD validator, but Cloudflare's asset
      // responses for this page carry no etag/last-modified — so we GET the page
      // once a minute and hash the body (FNV-1a) ourselves, reloading when the
      // hash moves. Still one request/min, and only while the tab is active; the
      // selection + filter are restored on reload so it's seamless. Best-effort —
      // ignores failures (e.g. remote rooms / cross-origin).
      function watchVersion() {
        let seen = null;
        const check = async () => {
          if (!isActive()) return;
          try {
            const body = await (await fetch(location.pathname, { cache: "no-store" })).text();
            let h = 0x811c9dc5;
            for (let i = 0; i < body.length; i++) {
              h ^= body.charCodeAt(i);
              h = Math.imul(h, 0x01000193);
            }
            const tag = h >>> 0;
            if (seen !== null && seen !== tag) return location.reload();
            seen = tag;
          } catch {}
        };
        check();
        setInterval(check, 60_000);
      }

      // ---- draggable middle splitter (VSCode-style) -------------------------
      // Drag adjusts the left column width (a CSS var on .app), clamped so neither
      // pane collapses, persisted per device, and refits the terminal as it moves.
      (function () {
        const sp = $("splitter");
        const app = document.querySelector(".app");
        const saved = localStorage.getItem("ay.leftw");
        if (saved) app.style.setProperty("--leftw", saved);
        let dragging = false;
        sp.addEventListener("pointerdown", (e) => {
          dragging = true;
          sp.classList.add("drag");
          sp.setPointerCapture(e.pointerId);
          e.preventDefault();
        });
        sp.addEventListener("pointermove", (e) => {
          if (!dragging) return;
          const w = Math.min(Math.max(e.clientX, 280), window.innerWidth - 360);
          app.style.setProperty("--leftw", w + "px");
          if (fit)
            try {
              fit.fit();
            } catch {}
        });
        const end = (e) => {
          if (!dragging) return;
          dragging = false;
          sp.classList.remove("drag");
          try {
            sp.releasePointerCapture(e.pointerId);
          } catch {}
          localStorage.setItem(
            "ay.leftw",
            getComputedStyle(app).getPropertyValue("--leftw").trim(),
          );
        };
        sp.addEventListener("pointerup", end);
        sp.addEventListener("pointercancel", end);
      })();
      boot();
    </script>
  </body>
</html>
