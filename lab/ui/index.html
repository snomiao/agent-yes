<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>agent-yes · console</title>
    <style>
      /* Palette borrowed from codehost (GitHub-dark) so the two feel like one system. */
      :root {
        /* Adapt native form controls / scrollbars to the OS theme too. */
        color-scheme: light dark;
        --bg: #0d1117;
        --panel: #161b22;
        --panel2: #1c2430;
        --line: #2d3748;
        --line2: #222b38;
        --fg: #e6edf3;
        --muted: #8b949e;
        --accent: #58a6ff;
        --green: #3fb950;
        --amber: #d29922;
        --purple: #bc8cff;
        --pink: #f778ba;
        --red: #f85149;
        --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      }
      /* Light theme — GitHub-light, the daylight counterpart of the dark palette
         above. prefers-color-scheme is re-evaluated by the browser the moment the
         OS flips, so every var() consumer recolors in real time, no JS, no reload.
         (The xterm canvas is the one exception — it's repainted from JS, see
         termTheme() below.) */
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #ffffff;
          --panel: #f6f8fa;
          --panel2: #eaeef2;
          --line: #d1d9e0;
          --line2: #d8dee4;
          --fg: #1f2328;
          --muted: #59636e;
          --accent: #0969da;
          --green: #1a7f37;
          --amber: #9a6700;
          --purple: #8250df;
          --pink: #bf3989;
          --red: #cf222e;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        height: 100vh;
        height: 100dvh; /* dodge the iOS/Android dynamic toolbar resize */
        overflow: hidden;
        -webkit-text-size-adjust: 100%;
        font:
          14px/1.55 -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          system-ui,
          sans-serif;
      }
      code {
        font-family: var(--mono);
        font-size: 12.5px;
        background: var(--panel2);
        padding: 1px 5px;
        border-radius: 5px;
        color: var(--purple);
      }

      /* grid-template-rows:minmax(0,1fr) caps the row at the viewport so the inner
     panes scroll instead of growing the page (the min-height:0 below lets the
     flex children actually shrink — without it overflow:auto never engages). */
      .app {
        display: grid;
        grid-template-columns: var(--leftw, 42%) 1px 1fr;
        grid-template-rows: minmax(0, 1fr);
        height: 100vh;
        height: 100dvh;
      }

      /* VSCode-style splitter: the visible divider stays 1px, but a ::before
         overlay widens the pointer hit area to ~11px so it's easy to grab. */
      .splitter {
        position: relative;
        background: var(--line);
        cursor: col-resize;
        z-index: 5;
      }
      .splitter::before {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: -5px;
        right: -5px;
      }
      .splitter:hover,
      .splitter.drag {
        background: var(--accent);
      }

      /* ---- left: list ---- */
      .left {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
      }
      .head {
        padding: 16px 18px 10px;
        border-bottom: 1px solid var(--line);
      }
      h1 {
        font-size: 18px;
        margin: 0 0 2px;
        letter-spacing: -0.02em;
      }
      h1 .tag {
        color: var(--accent);
      }
      .sub {
        color: var(--muted);
        font-size: 12.5px;
      }
      .install {
        margin-top: 8px;
        color: var(--muted);
        font-size: 11.5px;
      }
      .install code {
        cursor: pointer;
        color: var(--green);
      }
      .install code:hover {
        filter: brightness(1.25);
      }
      .install code {
        word-break: break-all;
      }
      .ibox {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 7px 11px;
        margin-top: 11px;
      }
      .ibox:focus-within {
        border-color: var(--accent);
      }
      .ibox .mag {
        color: var(--muted);
      }
      #q {
        flex: 1;
        background: transparent;
        border: 0;
        outline: 0;
        color: var(--fg);
        font: 13px var(--mono);
      }
      .meta {
        display: flex;
        justify-content: space-between;
        color: var(--muted);
        font-size: 11.5px;
        margin-top: 8px;
      }
      .connbadge {
        cursor: pointer;
        user-select: none;
      }
      .connbadge:hover {
        filter: brightness(1.3);
      }
      .rooms {
        position: relative;
        margin-top: 8px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 8px;
        font-size: 12px;
      }
      .rooms .rtitle {
        color: var(--muted);
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 2px 4px 6px;
      }
      .rooms .ritem {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 6px;
        border-radius: 7px;
      }
      .rooms .ritem:hover {
        background: var(--panel2);
      }
      .rooms .ritem.cur {
        box-shadow: inset 2px 0 0 var(--green);
      }
      .rooms .rstat {
        font-family: var(--mono);
        font-size: 10.5px;
        flex: none;
        min-width: 18px;
      }
      .rooms .rstat.on {
        color: var(--green);
      }
      .rooms .rstat.off {
        color: var(--muted);
        opacity: 0.6;
      }
      .rooms .rname {
        font-family: var(--mono);
        color: var(--accent);
        cursor: pointer;
        flex: 1;
      }
      .rooms .rhost {
        color: var(--muted);
        font-family: var(--mono);
        font-size: 10.5px;
      }
      .rooms .rx {
        color: var(--muted);
        cursor: pointer;
        padding: 0 4px;
      }
      .rooms .rx:hover {
        color: var(--red);
      }
      .rooms .radd {
        display: flex;
        gap: 6px;
        margin-top: 6px;
        padding-top: 6px;
        border-top: 1px solid var(--line2);
      }
      .rooms .radd input {
        flex: 1;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: 7px;
        color: var(--fg);
        font: 11.5px var(--mono);
        padding: 6px 8px;
        outline: 0;
      }
      .rooms .radd button {
        background: var(--accent);
        color: var(--bg);
        border: 0;
        border-radius: 7px;
        font-weight: 600;
        padding: 0 12px;
        cursor: pointer;
      }
      .rooms .empty2 {
        color: var(--muted);
        padding: 6px;
      }
      .rooms .rconnect {
        margin-top: 6px;
        padding: 8px 6px 2px;
        border-top: 1px solid var(--line2);
        color: var(--muted);
        font-size: 11px;
        line-height: 1.7;
      }
      .rooms .rconnect code {
        display: block;
        margin-top: 4px;
        cursor: pointer;
      }
      .rooms .rconnect code:hover {
        color: var(--accent);
      }

      /* launch overlay (command-only launch URLs: #launch=<json>) */
      .launchoverlay {
        position: fixed;
        inset: 0;
        z-index: 20;
        background: rgba(2, 6, 12, 0.7);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .lcard {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 22px 24px;
        width: min(560px, 92vw);
      }
      .lcard .ltitle {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 12px;
      }
      .lcard .lcmd {
        font-family: var(--mono);
        font-size: 13px;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
        color: var(--green);
        word-break: break-word;
      }
      .lcard .lcwd {
        color: var(--muted);
        font-family: var(--mono);
        font-size: 11.5px;
        margin-top: 6px;
      }
      .lcard .lfleets {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 16px;
      }
      .lcard .lfleet {
        background: var(--accent);
        color: var(--bg);
        border: 0;
        border-radius: 8px;
        font-weight: 600;
        font-family: var(--mono);
        padding: 8px 14px;
        cursor: pointer;
      }
      .lcard .lwarn {
        color: var(--amber);
        font-size: 12.5px;
        margin-top: 16px;
        line-height: 1.6;
      }
      .lcard .lwarn code {
        font-family: var(--mono);
        background: var(--bg);
        padding: 1px 6px;
        border-radius: 5px;
        color: var(--fg);
      }
      .lcard .lhint {
        color: var(--muted);
        font-size: 11.5px;
        margin-top: 12px;
      }
      .lcard .lcancel {
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 6px 14px;
        cursor: pointer;
        margin-top: 16px;
      }

      /* new-agent button (header) + spawn form (reuses the launch overlay shell) */
      .metaright {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .newbtn {
        background: var(--accent);
        color: var(--bg);
        border: 0;
        border-radius: 7px;
        font-weight: 600;
        font-size: 11.5px;
        padding: 4px 11px;
        cursor: pointer;
        line-height: 1.6;
      }
      .newbtn:hover {
        filter: brightness(1.12);
      }
      .viewbtn {
        background: transparent;
        border: 1px solid var(--line);
        border-radius: 7px;
        color: var(--muted);
        font-size: 11.5px;
        padding: 3px 9px;
        cursor: pointer;
        line-height: 1.6;
      }
      .viewbtn:hover {
        color: var(--fg);
        border-color: var(--accent);
      }
      .viewbtn.on {
        color: var(--accent);
        border-color: var(--accent);
      }
      .lcard .nfield {
        margin-top: 12px;
      }
      .lcard .nfield label {
        display: block;
        color: var(--muted);
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 4px;
      }
      .lcard .nfield input,
      .lcard .nfield textarea {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--fg);
        font: 13px var(--mono);
        padding: 8px 10px;
        outline: 0;
        resize: vertical;
      }
      .lcard .nfield input:focus,
      .lcard .nfield textarea:focus {
        border-color: var(--accent);
      }
      .lcard .lrow {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 18px;
      }
      .lcard .lrow .lcancel {
        margin-top: 0;
      }
      .lfleet:disabled {
        opacity: 0.5;
        cursor: progress;
      }

      .list {
        overflow-y: auto;
        flex: 1;
        min-height: 0;
      }
      .row {
        padding: 11px 18px;
        border-bottom: 1px solid var(--line2);
        cursor: pointer;
      }
      .row:hover {
        background: var(--panel);
      }
      .row.sel {
        background: var(--panel);
        box-shadow: inset 3px 0 0 var(--accent);
      }
      .r1 {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex: none;
      }
      .dot.active,
      .dot.running {
        background: var(--green);
      }
      .dot.idle {
        background: var(--amber);
      }
      .dot.stopped,
      .dot.exited {
        background: var(--muted);
      }
      .name {
        font-weight: 600;
      }
      .badge {
        font-family: var(--mono);
        font-size: 10.5px;
        padding: 1px 6px;
        border-radius: 5px;
        border: 1px solid var(--line);
        color: var(--muted);
      }
      .age {
        margin-left: auto;
        color: var(--muted);
        font-size: 11.5px;
      }
      /* git chip: ±changed ↑ahead ↓behind, amber when the worktree is dirty */
      .git {
        font-family: var(--mono);
        font-size: 10.5px;
        color: var(--muted);
        white-space: nowrap;
        flex: none;
      }
      .git.dirty {
        color: var(--amber);
      }
      .detail {
        color: var(--muted);
        font-size: 12.5px;
        margin-top: 4px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .rowtitle {
        color: var(--fg);
        font-size: 12.5px;
        margin-top: 4px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      /* compact view: one line per agent — dot + cli + live title (or prompt), age */
      .row.crow {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 18px;
      }
      .crow .cident {
        font-family: var(--mono);
        font-size: 11.5px;
        color: var(--green);
        flex: none;
      }
      .crow .cname {
        font-weight: 600;
        color: var(--purple);
        flex: none;
      }
      .crow .ctitle {
        flex: 1;
        min-width: 0;
        font-size: 12.5px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .crow .ctitle.dim {
        color: var(--muted);
      }
      .crow .age {
        margin-left: 0;
        flex: none;
      }
      .rowtags {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 6px;
      }
      .rtag {
        font-family: var(--mono);
        font-size: 11px;
        padding: 1px 7px;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: var(--muted);
        white-space: nowrap;
      }
      .rtag[data-k="repo"],
      .rtag[data-k="wt"] {
        color: var(--green);
        border-color: #1d3b25;
      }
      .rtag[data-k="cli"] {
        color: var(--purple);
        border-color: #3a2a4a;
      }
      .empty {
        text-align: center;
        color: var(--muted);
        padding: 40px;
      }

      /* ---- right: live tail + send (this is what codehost structurally can't do) ---- */
      .right {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
      }
      .rhead {
        padding: 14px 20px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .rhead .name {
        font-size: 15px;
      }
      /* back-to-list affordance — only surfaces in the single-column mobile view */
      .rback {
        display: none;
        align-items: center;
        justify-content: center;
        flex: none;
        width: 30px;
        height: 30px;
        margin: -4px 2px -4px -6px;
        padding: 0;
        background: transparent;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--fg);
        font-size: 19px;
        line-height: 1;
        cursor: pointer;
      }
      .rback:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .rhead .live {
        margin-left: auto;
        font-size: 11px;
        font-family: var(--mono);
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .rhead .live .dot {
        width: 7px;
        height: 7px;
      }
      .log {
        flex: 1;
        min-height: 0;
        overflow: hidden;
        padding: 8px 10px;
        background: var(--bg);
      }
      .log .xterm {
        height: 100%;
      }
      .log .xterm-viewport {
        background: transparent !important;
      }
      .placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--muted);
        font-size: 14px;
      }

      /* ---- mobile: collapse the two-pane desktop layout into a single column ----
         The list and the terminal stack into the same cell; only one is visible at
         a time. The list is the default ("master"); tapping an agent flips .app to
         .show-detail to reveal the terminal ("detail"), and the ‹ back button flips
         it back. The drag splitter is meaningless with one column, so it's hidden. */
      @media (max-width: 720px) {
        .install .winhint {
          display: none;
        }
        .app {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(0, 1fr);
        }
        .splitter {
          display: none;
        }
        /* both panes occupy the single grid cell; visibility picks the active one */
        .left,
        .right {
          grid-column: 1;
          grid-row: 1;
          min-width: 0;
        }
        .right {
          display: none;
        }
        .app.show-detail .left {
          display: none;
        }
        .app.show-detail .right {
          display: flex;
        }
        .rback {
          display: inline-flex;
        }

        .head {
          padding: 12px 14px 8px;
        }
        h1 {
          font-size: 17px;
        }
        /* roomier tap targets for the header controls */
        .newbtn,
        .viewbtn {
          padding: 7px 12px;
          font-size: 12.5px;
        }
        .meta {
          align-items: center;
        }
        .metaright {
          gap: 8px;
        }
        .row {
          padding: 13px 14px;
        }
        .row.crow {
          padding: 10px 14px;
        }
        .rhead {
          padding: 12px 14px;
        }
        .list .row,
        .rooms .ritem,
        .rooms .rx,
        .connbadge,
        .install code,
        code.copy {
          -webkit-tap-highlight-color: transparent;
        }
      }
    </style>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
    <script type="module">
      // codehost room transport — vendored from codehost's `bun run build:lib`.
      // Loaded as a module (deferred), so the classic script below awaits the
      // "codehost-ready" event before first use.
      import * as codehost from "./room-client.js";
      window.__codehost = codehost;
      window.dispatchEvent(new Event("codehost-ready"));
    </script>
  </head>
  <body>
    <div class="app">
      <div class="left">
        <div class="head">
          <h1><span class="tag">agent-yes</span> · console</h1>
          <div class="sub">
            Live <code>ay ls</code> + per-agent tail &amp; send. Backed by <code>ay serve</code>.
          </div>
          <div class="install" title="click to copy">
            install:
            <code class="copy">curl -fsSL https://agent-yes.com/setup.sh | sh</code>
            <span class="winhint"
              >·&nbsp;Windows:
              <code class="copy"
                >powershell -c "irm https://agent-yes.com/setup.ps1 | iex"</code
              ></span
            >
          </div>
          <div class="ibox">
            <span class="mag">⌕</span>
            <input
              id="q"
              placeholder="filter…  repo:agent-yes  claude  symval  (space = AND)"
              autocomplete="off"
              autofocus
            />
          </div>
          <div class="meta">
            <span id="count"></span>
            <span class="metaright">
              <button id="viewbtn" class="viewbtn" title="toggle compact list">☰</button>
              <button id="newbtn" class="newbtn" title="spawn a new agent on this fleet">
                + New agent
              </button>
              <span id="conn" class="connbadge" title="rooms — click to manage">● local</span>
            </span>
          </div>
          <div class="rooms" id="rooms" style="display: none"></div>
        </div>
        <div class="list" id="list"></div>
      </div>

      <div class="splitter" id="splitter" title="drag to resize"></div>

      <div class="right">
        <div class="rhead" id="rhead" style="display: none">
          <button class="rback" id="rback" title="back to list" aria-label="back to list">‹</button>
          <span class="dot" id="rdot"></span>
          <span class="name" id="rname"></span>
          <span class="badge" id="rpid"></span>
          <span class="live"
            ><span class="dot" id="livedot"></span><span id="livetxt">connecting…</span></span
          >
        </div>
        <div class="log" id="log">
          <div class="placeholder">
            ← pick an agent to tail its log; type directly into the terminal
          </div>
        </div>
      </div>
    </div>

    <div class="launchoverlay" id="launch" style="display: none"></div>
    <div class="launchoverlay" id="newform" style="display: none"></div>

    <script type="module">
      // Pure list/identity/filter helpers live in a sibling module so they can be
      // unit-tested (tests/ui-logic/console-logic.spec.ts) without a DOM. This
      // script is a module (deferred, runs after the codehost shim above sets
      // window.__codehost), so a static import is safe.
      import {
        cliLabel,
        repoBranch,
        ident,
        tagsFor,
        gitLabel,
        age,
        matches,
        nextIndex,
        identContext,
        compactIdent,
        fullIdent,
        hasIdent,
        deviceCount,
      } from "./console-logic.js";

      let entries = [];
      let sel = null; // selected agent's composite key (room#pid)
      let es = null; // live-tail subscription closer
      let term = null; // xterm.js Terminal rendering the raw PTY stream
      let fit = null;

      // xterm paints to a <canvas>, so unlike the CSS var() consumers it can't
      // ride prefers-color-scheme on its own — its theme is a JS object. Mirror
      // the OS preference here and re-apply it live when the system flips, so the
      // terminal recolors in lockstep with the rest of the UI.
      const prefersLight = window.matchMedia("(prefers-color-scheme: light)");
      const termTheme = () =>
        prefersLight.matches
          ? {
              // GitHub-light terminal palette. xterm's default ANSI slots are
              // tuned for a dark background, so setting only bg/fg/cursor leaves
              // white & bright-white SGR text (37/97) — common in CLI output —
              // near-invisible on #ffffff. Remap the white slots to dark grays
              // and darken the rest so every ANSI color stays legible on light.
              background: "#ffffff",
              foreground: "#1f2328",
              cursor: "#1f2328",
              selectionBackground: "#b6d6ff",
              black: "#24292e",
              red: "#cf222e",
              green: "#116329",
              yellow: "#4d2d00",
              blue: "#0969da",
              magenta: "#8250df",
              cyan: "#1b7c83",
              white: "#6e7781",
              brightBlack: "#57606a",
              brightRed: "#a40e26",
              brightGreen: "#1a7f37",
              brightYellow: "#633c01",
              brightBlue: "#218bff",
              brightMagenta: "#a475f9",
              brightCyan: "#3192aa",
              brightWhite: "#1f2328",
            }
          : { background: "#0d1117", foreground: "#c9d1d9", cursor: "#0d1117" };
      // Exposed so the headless theme e2e can assert the light ANSI palette
      // keeps the white slots dark (legible on a white terminal background).
      window.__termTheme = termTheme;
      prefersLight.addEventListener("change", () => {
        if (term) term.options.theme = termTheme();
      });

      const $ = (id) => document.getElementById(id);
      const esc = (s) =>
        String(s ?? "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[c]);

      // ---- transport ---------------------------------------------------------
      // Local: same-origin fetch + EventSource (via the ay-serve proxy).
      // Remote: an /api/* call tunnelled over a WebRTC DataChannel to a peer running
      // `ay serve --share` — established through the signaling server. Same call
      // sites, two wires. Remote is selected by a URL hash: #room:token[@sighost].
      const SIG_DEFAULT = "s.agent-yes.com"; // signaling host (override in the hash with @host)
      const SUB = "ay-signal-1";

      // Tunnels request/response + streaming over one DataChannel. Mirrors the
      // envelope in lab/ui/share-host.ts: {t:"req"|"abort"} out, {t:"res"|"data"|"end"} in.
      class RTCClient {
        constructor(host, room, token) {
          Object.assign(this, {
            host,
            room,
            token,
            dc: null,
            nextId: 1,
            calls: new Map(),
            streams: new Map(),
            onstate: () => {},
          });
        }
        connect() {
          return new Promise((resolve, reject) => {
            const ws = new WebSocket(`wss://${this.host}/${this.room}`, [SUB]);
            this.ws = ws; // kept so close() can drop the signaling registration too
            let pc,
              settled = false;
            const fail = (e) => {
              if (!settled) {
                settled = true;
                reject(e);
              }
            };
            ws.onopen = () =>
              ws.send(JSON.stringify({ type: "hello", role: "client", token: this.token }));
            ws.onmessage = async (ev) => {
              const m = JSON.parse(ev.data);
              if (m.type === "welcome") {
                pc = new RTCPeerConnection({
                  iceServers: [{ urls: "stun:stun.l.google.com:19302" }],
                });
                this.pc = pc;
                pc.onicecandidate = (e) => {
                  if (e.candidate)
                    ws.send(JSON.stringify({ type: "candidate", candidate: e.candidate }));
                };
                pc.onconnectionstatechange = () => this.onstate(pc.connectionState);
                pc.ondatachannel = (e) => {
                  this.dc = e.channel;
                  this.dc.onopen = () => {
                    settled = true;
                    this.onstate("open");
                    resolve();
                  };
                  this.dc.onmessage = (ev2) => this._recv(JSON.parse(ev2.data));
                  this.dc.onclose = () => this.onstate("closed");
                };
              } else if (m.type === "offer") {
                await pc.setRemoteDescription({ type: "offer", sdp: m.sdp });
                await pc.setLocalDescription(await pc.createAnswer());
                ws.send(JSON.stringify({ type: "answer", sdp: pc.localDescription.sdp }));
              } else if (m.type === "candidate") {
                await pc.addIceCandidate(m.candidate).catch(() => {});
              }
            };
            ws.onerror = () => fail(new Error("signaling error"));
            ws.onclose = () => fail(new Error("signaling closed"));
            setTimeout(() => fail(new Error("connect timeout")), 8000);
          });
        }
        _recv(r) {
          const call = this.calls.get(r.id),
            stream = this.streams.get(r.id);
          if (r.t === "res") {
            if (call) {
              call.status = r.status;
            }
          } else if (r.t === "data") {
            if (call) call.body += r.chunk;
            if (stream) stream(r.chunk);
          } else if (r.t === "end") {
            if (call) {
              clearTimeout(call.timer);
              this.calls.delete(r.id);
              r.error
                ? call.reject(new Error(r.error))
                : call.resolve({ status: call.status, text: call.body });
            }
          }
        }
        req(method, path, body) {
          const id = this.nextId++;
          return new Promise((resolve, reject) => {
            // Without a deadline a request over a silently-dead DataChannel (host
            // gone, ICE not yet timed out) never settles, so the caller — and the
            // poll loop — hangs forever and the room never reconnects. Reject on a
            // timeout so listSource sees the failure and triggers backoff.
            const timer = setTimeout(() => {
              if (this.calls.delete(id)) reject(new Error("request timed out"));
            }, 12000);
            this.calls.set(id, { status: 0, body: "", resolve, reject, timer });
            try {
              this.dc.send(JSON.stringify({ t: "req", id, method, path, body }));
            } catch (e) {
              clearTimeout(timer);
              this.calls.delete(id);
              reject(e); // channel already torn down
            }
          });
        }
        subscribe(path, onRaw) {
          const id = this.nextId++;
          this.streams.set(id, onRaw);
          this.dc.send(JSON.stringify({ t: "req", id, method: "GET", path }));
          return () => {
            this.streams.delete(id);
            try {
              this.dc.send(JSON.stringify({ t: "abort", id }));
            } catch {}
          };
        }
        // Tear down BOTH wires. Closing only the pc leaves the signaling socket
        // open and this client registered in the room, so each reconnect would
        // leak another peer on the host. onstate is detached by the caller first.
        close() {
          try {
            this.ws?.close();
          } catch {}
          try {
            this.pc?.close();
          } catch {}
          this.dc = null;
          // Settle anything still in flight now, rather than letting each req's
          // 12s timeout fire long after the client is gone.
          for (const c of this.calls.values()) {
            clearTimeout(c.timer);
            c.reject(new Error("connection closed"));
          }
          this.calls.clear();
          this.streams.clear();
        }
      }

      // ---- codehost rooms: a THIRD wire -----------------------------------
      // A codehost room can hold several machines: every `codehost serve`
      // daemon advertises its live agents (PeerMeta.agents) and proxies the
      // local ay-serve API over its WebRTC tunnel at /__codehost/agent-yes/*.
      // This wire aggregates all hosts' agents into one list, then routes each
      // per-agent call to the host that owns the pid. Known v1 limitation:
      // pids may collide across hosts (last listed wins); the host: tag keeps
      // them tellable-apart visually.
      const CH_API = "/__codehost/agent-yes";
      class CodehostClient {
        constructor(token) {
          Object.assign(this, { token, room: null, byPid: new Map(), onstate: () => {} });
        }
        async connect() {
          if (!window.__codehost)
            await new Promise((r) => window.addEventListener("codehost-ready", r, { once: true }));
          let firstPeers;
          const ready = new Promise((resolve) => (firstPeers = resolve));
          this.room = window.__codehost.joinRoom({
            token: this.token,
            onStatus: (open) => {
              if (!open) this.onstate("closed");
            },
            onPeers: () => {
              this.onstate("open");
              firstPeers();
            },
          });
          // First peer broadcast usually lands instantly after the WS opens;
          // don't hang the UI on an empty/unreachable room.
          await Promise.race([ready, new Promise((r) => setTimeout(r, 6000))]);
        }
        close() {
          this.room?.close();
        }
        hosts() {
          // Machines that can answer for agents: anything advertising agents,
          // plus root daemons (their ay serve may know agents the broadcast
          // hasn't picked up yet).
          return (this.room?.peers || []).filter(
            (p) => p.meta && ((p.meta.agents || []).length || p.meta.kind === "root"),
          );
        }
        anyHost() {
          const h = this.hosts();
          return h.length ? h[0].peerId : null;
        }
        peerFor(path) {
          const m = /^\/api\/(?:tail|size|resize|read|status)\/([^/?]+)/.exec(path);
          const kw = m ? decodeURIComponent(m[1]) : null;
          return (kw && this.byPid.get(kw)) || null;
        }
        async ls(path) {
          const hosts = this.hosts();
          const lists = await Promise.all(
            hosts.map(async (p) => {
              try {
                const res = await this.room.fetch(p.peerId, "GET", CH_API + path);
                if (!res.ok) throw new Error("HTTP " + res.status);
                return (await res.json()).map((e) => ({ ...e, _host: p.meta?.host }));
              } catch {
                // ay serve down on that host — fall back to the daemon-advertised list.
                return (p.meta?.agents || []).map((a) => ({
                  pid: a.pid,
                  cli: a.tool,
                  title: a.title || null,
                  prompt: a.title || null,
                  cwd: a.cwd,
                  status: a.state,
                  started_at: a.startedAt,
                  _host: p.meta?.host,
                }));
              }
            }),
          );
          const byPid = new Map();
          const merged = [];
          lists.forEach((arr, i) => {
            for (const e of arr) {
              byPid.set(String(e.pid), hosts[i].peerId);
              merged.push(e);
            }
          });
          this.byPid = byPid;
          return merged;
        }
        async fetchJSON(path) {
          if (path.startsWith("/api/ls")) return this.ls(path);
          const peer = this.peerFor(path) || this.anyHost();
          if (!peer) throw new Error("no codehost peer");
          const res = await this.room.fetch(peer, "GET", CH_API + path);
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.json();
        }
        async post(path, bodyObj) {
          const kw = bodyObj && bodyObj.keyword != null ? String(bodyObj.keyword) : null;
          const peer = (kw && this.byPid.get(kw)) || this.peerFor(path) || this.anyHost();
          if (!peer) return { ok: false, text: "no codehost peer in the room" };
          const res = await this.room.fetch(peer, "POST", CH_API + path, {
            headers: { "content-type": "application/json" },
            body: JSON.stringify(bodyObj),
          });
          return { ok: res.status >= 200 && res.status < 300, text: await res.text() };
        }
        subscribe(path, onText, onOpen, onError) {
          let cancelled = false;
          let reader = null;
          (async () => {
            const peer = this.peerFor(path) || this.anyHost();
            if (!peer) {
              onError && onError();
              return;
            }
            try {
              const res = await this.room.fetch(peer, "GET", CH_API + path, {
                headers: { accept: "text/event-stream" },
              });
              if (!res.ok || !res.body) throw new Error("HTTP " + res.status);
              onOpen && onOpen();
              reader = res.body.getReader();
              const dec = new TextDecoder();
              let buf = "";
              for (;;) {
                const { done, value } = await reader.read();
                if (done || cancelled) break;
                buf += dec.decode(value, { stream: true });
                let i;
                while ((i = buf.indexOf("\n\n")) >= 0) {
                  const evt = buf.slice(0, i);
                  buf = buf.slice(i + 2);
                  for (const line of evt.split("\n"))
                    if (line.startsWith("data:")) {
                      try {
                        onText(JSON.parse(line.slice(5).trim()));
                      } catch {}
                    }
                }
              }
              if (!cancelled) onError && onError();
            } catch {
              if (!cancelled) onError && onError();
            }
          })();
          return () => {
            cancelled = true;
            try {
              reader?.cancel();
            } catch {}
          };
        }
      }

      // `ay serve --http` serves this page itself and prints a #k=<token> link;
      // boot() stores the token and local /api calls carry it as ?token= (query,
      // not header — EventSource can't set headers). When served via the lab
      // proxy instead, no token is stored and paths stay bare (proxy injects).
      const withTok = (path) => {
        const t = localStorage.getItem("ay.localToken");
        return t
          ? path + (path.includes("?") ? "&" : "?") + "token=" + encodeURIComponent(t)
          : path;
      };

      // ---- transports: a uniform { fetchJSON, post, subscribe } over each wire ----
      // local (same-origin ay serve), an ay-share RTCClient, or a codehost room.
      // CodehostClient already exposes this shape, so it's used as a tx directly.
      const localTx = {
        async fetchJSON(path) {
          return (await fetch(withTok(path))).json();
        },
        async post(path, bodyObj) {
          const r = await fetch(withTok(path), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(bodyObj),
          });
          return { ok: r.ok, text: await r.text() };
        },
        subscribe(path, onText, onOpen, onError) {
          const ev = new EventSource(withTok(path));
          ev.onopen = () => onOpen && onOpen();
          ev.onmessage = (e) => onText(JSON.parse(e.data));
          ev.onerror = () => onError && onError();
          return () => ev.close();
        },
      };
      function rtcTx(rtc) {
        return {
          async fetchJSON(path) {
            return JSON.parse((await rtc.req("GET", path)).text);
          },
          async post(path, bodyObj) {
            const r = await rtc.req("POST", path, JSON.stringify(bodyObj));
            return { ok: r.status >= 200 && r.status < 300, text: r.text };
          },
          subscribe(path, onText, onOpen, onError) {
            onOpen && onOpen();
            let buf = "";
            return rtc.subscribe(path, (raw) => {
              buf += raw;
              let i;
              while ((i = buf.indexOf("\n\n")) >= 0) {
                const evt = buf.slice(0, i);
                buf = buf.slice(i + 2);
                for (const line of evt.split("\n"))
                  if (line.startsWith("data:")) {
                    try {
                      onText(JSON.parse(line.slice(5).trim()));
                    } catch {}
                  }
              }
            });
          },
        };
      }

      // ---- fleet: local + every saved room, all connected at once ------------
      // Each source contributes its agents to one merged list (tagged with the
      // owning source on `_room`/`_key`); per-agent ops route back via srcFor/txFor.
      // Live counts in the rooms panel come from each source's serverCount/devices.
      const LOCAL = "local";
      const sources = new Map(); // id -> { id, host, kind, tx, client, live, devices, serverCount }
      const srcFor = (e) => (e && sources.get(e._room)) || sources.get(LOCAL) || null;
      const txFor = (e) => srcFor(e)?.tx || localTx;

      // The local source is only worth polling when this page is actually backed
      // by an ay serve: localhost, or served by `ay serve --http` (which leaves a
      // token), or when there are no rooms to fall back on. On the public origin
      // with rooms, skip it so we don't hammer a 404 every poll.
      function ensureLocalSource() {
        const isLocalhost = ["localhost", "127.0.0.1", "[::1]"].includes(location.hostname);
        const hasToken = !!localStorage.getItem("ay.localToken");
        const enabled = isLocalhost || hasToken || Object.keys(loadRooms()).length === 0;
        if (enabled && !sources.has(LOCAL)) {
          const s = {
            id: LOCAL,
            host: "local",
            kind: "local",
            tx: localTx,
            client: null,
            live: false,
            tried: true, // no connect phase — polled directly
            devices: new Set(),
            serverCount: 0,
          };
          sources.set(LOCAL, s);
          subscribeSource(s);
        } else if (!enabled && sources.has(LOCAL)) {
          unsubscribeSource(sources.get(LOCAL));
          sources.delete(LOCAL);
        }
      }

      // Pull one source's agent list, tagging each row with its origin + a
      // composite key (pids can collide across rooms). Updates the source's live
      // flag, device set, and server count for the rooms panel.
      // Stamp a source's raw /api/ls records with their origin + composite key
      // (pids collide across rooms) and recompute the source's device set + server
      // count for the rooms panel. Pure transform of the source's current records.
      function stampAgents(s) {
        s.devices = new Set();
        const out = [...(s.byPid?.values() || [])].map((e) => {
          // codehost stamps _host per agent; agent-yes share rooms fall back to
          // the room's device label (from /api/whoami). Local stays unlabelled
          // (no deviceLabel) so a single-machine view keeps its clean path-only
          // identity instead of a blank "@:" prefix.
          const host = e._host || s.deviceLabel || "";
          if (host) s.devices.add(host);
          return { ...e, _room: s.id, _key: s.id + "#" + e.pid, _host: host };
        });
        s.serverCount =
          s.kind === "ch" ? s.client?.hosts().length || 0 : s.devices.size || (s.live ? 1 : 0);
        s.agents = out;
      }

      // Replace a source's whole record set (full /api/ls fetch or a stream
      // snapshot). Resets byPid so later stream deltas diff against it cleanly.
      function applyFull(s, arr) {
        s.byPid = new Map((Array.isArray(arr) ? arr : []).map((r) => [r.pid, r]));
        s.live = true;
        stampAgents(s);
      }

      // Apply one stream event: a full snapshot, or an incremental
      // { upsert:[changed], remove:[gone pids] } delta from /api/ls/subscribe.
      function applyDelta(s, ev) {
        if (ev.full) return applyFull(s, ev.upsert);
        if (!s.byPid) s.byPid = new Map();
        for (const r of ev.upsert || []) s.byPid.set(r.pid, r);
        for (const pid of ev.remove || []) s.byPid.delete(pid);
        s.live = true;
        stampAgents(s);
      }

      // Fallback poll for a source that isn't streaming (older host with no
      // /api/ls/subscribe, or before its first delta lands).
      async function listSource(s) {
        try {
          applyFull(s, await s.tx.fetchJSON("/api/ls?all=1"));
          return s.agents;
        } catch {
          s.live = false;
          s.serverCount = 0;
          s.byPid = new Map();
          s.agents = [];
          // A failed poll on an agent-yes room means the tunnel is unresponsive
          // (host gone/restarted) — the fastest, most reliable drop signal we get,
          // since WebRTC's own failed/closed state can lag 15-30s. Kick off the
          // backoff reconnect (no-op if one's already queued or the room's gone).
          if (s.kind === "rtc") scheduleRtcReconnect(s);
          return [];
        }
      }

      // Subscribe to a source's throttled delta stream instead of re-polling its
      // whole list. The first event flips `streaming` on, so the reconcile poll
      // skips this source — no duplicate full-list bytes on the wire. Older hosts
      // without the endpoint never send an event, so the poll keeps covering them.
      function subscribeSource(s) {
        if (!s.tx || s.unsub) return;
        s.unsub = s.tx.subscribe(
          "/api/ls/subscribe?all=1",
          (ev) => {
            if (!ev || typeof ev !== "object") return;
            s.streaming = true;
            applyDelta(s, ev);
            mergeRender();
          },
          null,
          () => {
            s.streaming = false;
          },
        );
      }
      function unsubscribeSource(s) {
        try {
          s.unsub?.();
        } catch {}
        s.unsub = null;
        s.streaming = false;
      }

      // Compact list: one line per agent (dot + cli + title), persisted per device.
      let compactList = localStorage.getItem("ay.compactList") === "1";

      // A small git chip (±changed ↑ahead ↓behind) for a row, amber when the tree
      // is dirty. Empty for clean/in-sync repos and non-git cwds — no noise.
      function gitChipHtml(e) {
        const label = gitLabel(e);
        if (!label) return "";
        const g = e.git || {};
        const tip = `git: ${g.changed || 0} changed · ${g.ahead || 0} ahead · ${g.behind || 0} behind`;
        return `<span class="git${g.dirty ? " dirty" : ""}" title="${esc(tip)}">${esc(label)}</span>`;
      }

      function renderList() {
        const toks = $("q").value.trim().split(/\s+/).filter(Boolean);
        const shown = entries.filter((e) => matches(e, toks));
        $("count").textContent = `${shown.length} / ${entries.length} agents`;
        $("viewbtn").classList.toggle("on", compactList);
        // identContext blanks any field uniform across the shown list (so a
        // single-device fleet shows no device); multiDevice gates the detailed
        // host tag so it only appears when machines are actually mixed.
        const ctx = identContext(shown);
        const multiDevice = deviceCount(shown) > 1;
        if (compactList) {
          $("list").innerHTML =
            shown
              .map((e) => {
                const t = e.title || e.prompt || "";
                const id = compactIdent(e, ctx);
                const cli = cliLabel(e);
                return `<div class="row crow ${e._key === sel ? "sel" : ""}" data-key="${esc(e._key)}">
        <span class="dot ${esc(e.status)}"></span>
        ${hasIdent(id) ? `<span class="cident" title="${esc(fullIdent(e))}">${esc(id)}</span>` : ""}
        ${cli ? `<span class="cname">${esc(cli)}</span>` : ""}
        <span class="ctitle ${e.title ? "" : "dim"}" title="${esc(t)}">${esc(t)}</span>
        ${gitChipHtml(e)}
        <span class="age">${age(e)}</span></div>`;
              })
              .join("") || `<div class="empty">no match</div>`;
          return;
        }
        $("list").innerHTML =
          shown
            .map((e) => {
              // The host tag only earns its place when several machines are in
              // play; otherwise it's noise (every row would carry the same one).
              const tags = tagsFor(e)
                .filter(([k]) => k !== "host" || multiDevice)
                .map(
                  ([k, v]) =>
                    `<span class="rtag" data-k="${k}"><span style="opacity:.55">${k}:</span>${esc(v)}</span>`,
                )
                .join("");
              return `<div class="row ${e._key === sel ? "sel" : ""}" data-key="${esc(e._key)}">
        <div class="r1"><span class="dot ${esc(e.status)}"></span>
          <span class="name">${esc(cliLabel(e) || ident(e) || "agent")}</span>
          <span class="badge">pid ${e.pid}</span>
          ${gitChipHtml(e)}
          <span class="age">${age(e)}</span></div>
        ${e.title ? `<div class="rowtitle" title="${esc(e.title)}">${esc(e.title)}</div>` : ""}
        ${e.prompt ? `<div class="detail" title="${esc(e.prompt)}">${esc(e.prompt)}</div>` : ""}
        <div class="rowtags">${tags}</div>
      </div>`;
            })
            .join("") || `<div class="empty">no match</div>`;
      }

      // Restore the last filter so a refresh (incl. the auto-reload on a new
      // deploy) doesn't wipe what you were narrowing to. Set before the first
      // render so the list comes up already filtered.
      try {
        const savedFilter = localStorage.getItem("ay.filter");
        if (savedFilter) $("q").value = savedFilter;
      } catch {}

      // A ?pid=<pid> in the URL (codehost.dev's agent chips link here) selects
      // that agent as soon as it shows up in the list, then forgets itself. With
      // no ?pid, fall back to the agent this device last had selected — so a
      // refresh lands you back on the same agent instead of the placeholder.
      // autoPidExplicit distinguishes the two: an explicit link opens the agent
      // even on mobile (it's a deliberate "take me here"), whereas a merely
      // restored selection only re-highlights the row on a phone — see loadList.
      let autoPid = new URLSearchParams(location.search).get("pid");
      let autoPidExplicit = !!autoPid;
      if (autoPid) {
        history.replaceState(null, document.title, location.pathname + location.hash);
      } else {
        try {
          autoPid = localStorage.getItem("ay.sel");
        } catch {}
      }

      // Match a stored/linked selection token against an entry: either the full
      // composite key (room#pid) or a bare pid (?pid= deep links, legacy ay.sel).
      const matchSel = (e, token) => e._key === token || String(e.pid) === String(token);

      // Reconcile poll: refresh only the sources that aren't streaming (older
      // hosts, or ones whose stream hasn't delivered its first snapshot yet) and
      // re-render. Streaming sources keep themselves current via subscribeSource,
      // so this stays a no-op on the wire for a modern fleet — it still re-renders
      // every tick, which keeps the relative "age" column fresh.
      async function loadList() {
        const srcs = [...sources.values()];
        await Promise.all(srcs.filter((s) => !s.streaming).map(listSource));
        mergeRender();
      }

      // Merge every source's stamped agents into the flat `entries` list, update
      // the connection badge + rooms panel, and re-render. Called after every poll
      // and every stream delta.
      function mergeRender() {
        const srcs = [...sources.values()];
        entries = srcs.flatMap((s) => s.agents || []);
        // Badge: total agents + how many rooms are live. Red only when nothing
        // at all is reachable (no source answered).
        const roomSrcs = srcs.filter((s) => s.id !== LOCAL);
        const liveRooms = roomSrcs.filter((s) => s.live).length;
        const anyLive = srcs.some((s) => s.live);
        const connecting = roomSrcs.some((s) => !s.tried);
        const n = entries.length;
        if (!srcs.length) {
          setConn("● no fleet", "var(--muted)");
        } else if (!anyLive) {
          if (connecting) setConn("● connecting…", "var(--amber)");
          else setConn(roomSrcs.length ? "● rooms offline" : "● ay serve down", "var(--red)");
        } else {
          const roomBit = liveRooms ? ` · ${liveRooms} room${liveRooms === 1 ? "" : "s"}` : "";
          setConn(`● ${n} agent${n === 1 ? "" : "s"}${roomBit}`, "var(--green)");
        }
        renderRoomsIfOpen();
        renderList();
        if (autoPid && entries.some((x) => matchSel(x, autoPid))) {
          const tok = autoPid;
          autoPid = null;
          const e = entries.find((x) => matchSel(x, tok));
          // On a phone, a restored selection re-highlights the row but stays on
          // the list — opening it would flip straight into the full-screen
          // terminal (show-detail) and hide the list. An explicit ?pid= link is
          // a deliberate jump, so it still opens. Desktop shows both panes, so
          // there's nothing to scope — always open.
          if (autoPidExplicit || window.innerWidth > 720) {
            select(e._key);
          } else {
            sel = e._key;
            renderList();
          }
        }
      }

      function select(keyOrPid) {
        const e =
          entries.find((x) => x._key === keyOrPid) ||
          entries.find((x) => String(x.pid) === String(keyOrPid));
        if (!e) {
          sel = String(keyOrPid);
          return;
        }
        sel = e._key;
        // Remember the selection so a refresh re-opens this agent (see boot/autoPid).
        try {
          localStorage.setItem("ay.sel", sel);
        } catch {}
        // pid + tx are how we talk to the agent's own host; sel (composite) is
        // only for UI identity/highlight, since pids can collide across rooms.
        const pid = e.pid;
        const tx = txFor(e);
        renderList();
        // Mobile: flip the single-column layout to the terminal ("detail") pane.
        // Done BEFORE term.open below so xterm measures a visible container.
        document.querySelector(".app").classList.add("show-detail");
        $("rhead").style.display = "flex";
        $("rdot").className = "dot " + e.status;
        $("rname").textContent = e.title || cliLabel(e) || ident(e) || "agent";
        $("rpid").textContent = "pid " + e.pid;

        // Render the agent's native TUI with xterm.js by feeding it the raw PTY
        // stream (ANSI/cursor control intact) — see /api/tail?raw=1.
        if (es) es.close();
        if (term) {
          term.dispose();
          term = null;
        }
        const logEl = $("log");
        logEl.innerHTML = "";
        term = new Terminal({
          convertEol: false,
          disableStdin: false,
          cursorBlink: true,
          scrollback: 5000,
          fontSize: 12,
          fontFamily: 'ui-monospace, "SF Mono", Menlo, monospace',
          theme: termTheme(),
        });
        fit = new FitAddon.FitAddon();
        term.loadAddon(fit);
        // Make plain URLs in the output clickable. Agents that emit OSC 8
        // hyperlinks already get clickable text, but most output is bare URLs —
        // this addon scans the rendered buffer and links them too. Click opens a
        // new tab (noopener so the page can't be tampered with via window.opener).
        try {
          term.loadAddon(
            new WebLinksAddon.WebLinksAddon((e, uri) =>
              window.open(uri, "_blank", "noopener,noreferrer"),
            ),
          );
        } catch {
          /* addon CDN blocked — terminal still works, just without auto-links */
        }
        term.open(logEl);
        // On a phone, auto-focusing yanks up the soft keyboard the moment you open
        // an agent — even when you only meant to read the tail. Skip it there; a tap
        // on the terminal still focuses to type. Desktop keeps instant keyboard input.
        if (window.innerWidth > 720) term.focus();
        // An agent can rename itself by emitting an OSC 0/2 title sequence
        // (\x1b]2;my-name\x07); xterm parses it out of the raw PTY stream we already
        // feed it, so we just surface the latest title as the header name. Falls
        // back to the cli name when the agent never sets one.
        term.onTitleChange((t) => {
          const title = t && t.trim();
          if (sel !== e._key || !title) return;
          $("rname").textContent = title;
          // Keep the left panel in lockstep with the terminal header. The row
          // title otherwise only refreshes on the 3s /api/ls poll, so it visibly
          // lagged the live terminal. Patch the current entry (entries is
          // replaced wholesale each poll, so look it up by _key, not via the
          // captured `e`) and re-render — but only when the title actually
          // changed, so a TUI re-emitting the same OSC doesn't churn the list.
          const ent = entries.find((x) => x._key === e._key);
          if (ent && ent.title !== title) {
            ent.title = title;
            renderList();
          }
        });
        // Adapt: drive the agent's PTY to the browser terminal size (POST
        // /api/resize → winsize + SIGWINCH) so its TUI reflows to match what we
        // render. Suppressed while we're merely adopting the agent's OWN size.
        let adoptingAgentSize = false;
        const pushSize = () => {
          if (term && sel === e._key && !adoptingAgentSize)
            tx.post("/api/resize/" + encodeURIComponent(pid), {
              cols: term.cols,
              rows: term.rows,
            }).catch(() => {});
        };
        term.onResize(pushSize);
        // Forward everything the terminal emits to the agent stdin (raw, no
        // trailing Enter): keystrokes, paste, and — when a TUI enables mouse
        // tracking — click / drag-motion / wheel as SGR mouse reports. onBinary
        // covers the UTF-8 mouse encoding (DECSET 1005). Verified end-to-end:
        // a drag emits \x1b[<0;..M / \x1b[<32;..M / \x1b[<0;..m, wheel \x1b[<64/65..M.
        // keyword MUST be a string — ay serve's POST /api/send rejects a numeric
        // keyword with 400 (pid arrives as a number from /api/ls JSON).
        const kw = String(pid);
        const fwd = (d) => {
          if (sel === e._key)
            tx.post("/api/send", { keyword: kw, msg: d, code: "none" }).catch(() => {});
        };
        term.onData(fwd);
        term.onBinary(fwd);
        // Render the existing buffer at the AGENT's current width first so its
        // wrapping is correct, instead of forcing our viewport width onto stale
        // content. The user adapts to the window by resizing it (fit → push).
        const selKey = e._key;
        tx.fetchJSON("/api/size/" + encodeURIComponent(pid))
          .then((sz) => {
            if (sel !== selKey || !term) return;
            if (sz && sz.cols && sz.rows) {
              adoptingAgentSize = true;
              term.resize(sz.cols, sz.rows);
              adoptingAgentSize = false;
            } else {
              try {
                fit.fit();
              } catch {}
            }
          })
          .catch(() => {
            try {
              fit.fit();
            } catch {}
          });

        // True live tail via ay serve's SSE stream. First event is an xterm-rendered
        // tail snapshot; later events are incremental deltas. We normalise terminal
        // carriage returns so the stream reads cleanly as HTML, autoscroll while the
        // viewer is pinned to the bottom, and cap the buffer so it can't grow forever.
        $("livedot").className = "dot idle";
        $("livetxt").textContent = "connecting…";
        const close = tx.subscribe(
          "/api/tail/" + encodeURIComponent(pid) + "?raw=1",
          (raw) => {
            if (term) term.write(raw);
          },
          () => {
            $("livedot").className = "dot active";
            $("livetxt").textContent = "live";
          },
          () => {
            $("livedot").className = "dot stopped";
            $("livetxt").textContent = "disconnected";
          },
        );
        es = { close };
      }

      $("list").addEventListener("click", (ev) => {
        const row = ev.target.closest(".row");
        if (row) select(row.dataset.key);
      });
      // Mobile back button: return to the list pane. The tail keeps streaming in the
      // background (selection unchanged), so reopening the agent is instant.
      $("rback").addEventListener("click", () => {
        document.querySelector(".app").classList.remove("show-detail");
      });
      $("q").addEventListener("input", () => {
        try {
          localStorage.setItem("ay.filter", $("q").value);
        } catch {}
        renderList();
      });
      $("viewbtn").addEventListener("click", () => {
        compactList = !compactList;
        localStorage.setItem("ay.compactList", compactList ? "1" : "0");
        renderList();
      });
      window.addEventListener("resize", () => {
        if (fit)
          try {
            fit.fit();
          } catch {}
      });

      // Step the selection up/down the (filtered) list — same order the left panel
      // renders. Clamps at the ends, scrolls the row into view.
      function stepSelection(dir) {
        const toks = $("q").value.trim().split(/\s+/).filter(Boolean);
        const shown = entries.filter((e) => matches(e, toks));
        if (!shown.length) return;
        const cur = shown.findIndex((e) => e._key === sel);
        const next = shown[nextIndex(shown.length, cur, dir)];
        select(next._key);
        const row = $("list").querySelector('.row[data-key="' + CSS.escape(next._key) + '"]');
        if (row) row.scrollIntoView({ block: "nearest" });
      }
      // Cmd+ArrowDown/Up (Mac) or Alt+ArrowDown/Up (Windows/Linux) cycles agents.
      // The modifier differs per-OS because horizontal arrows mean "go forward/back":
      // Mac uses Cmd+Left/Right for that, Windows/Linux use Alt+Left/Right — so we
      // pick the platform's own modifier for the vertical agent-switch combo.
      // Capture phase on window so it fires BEFORE xterm's textarea handler —
      // stopPropagation then keeps the combo from being forwarded to the focused
      // agent's PTY as keystrokes.
      const IS_MAC = /Mac|iPhone|iPad|iPod/i.test(navigator.platform || navigator.userAgent || "");
      window.addEventListener(
        "keydown",
        (e) => {
          const mod = IS_MAC ? e.metaKey : e.altKey;
          if (!mod || (e.key !== "ArrowDown" && e.key !== "ArrowUp")) return;
          e.preventDefault();
          e.stopPropagation();
          stepSelection(e.key === "ArrowDown" ? 1 : -1);
        },
        true,
      );

      // ---- rooms: localStorage cache + a manager you open by clicking the badge ----
      const ROOMS_KEY = "ay.rooms";
      const loadRooms = () => {
        try {
          return JSON.parse(localStorage.getItem(ROOMS_KEY) || "{}");
        } catch {
          return {};
        }
      };
      const saveRoom = (room, token, host) => {
        const r = loadRooms();
        r[room] = { token, host: host || SIG_DEFAULT, ts: Date.now() };
        localStorage.setItem(ROOMS_KEY, JSON.stringify(r));
      };
      const dropRoom = (room) => {
        const r = loadRooms();
        delete r[room];
        localStorage.setItem(ROOMS_KEY, JSON.stringify(r));
      };
      function setConn(text, color) {
        $("conn").textContent = text;
        $("conn").style.color = color;
      }

      // codehost rooms ride the same saved-rooms cache, discriminated by the
      // sentinel host "codehost". The token is a bearer secret — never render
      // it; display a short FNV-1a mnemonic instead (mirrors codehost.dev).
      const CH_HOST = "codehost";
      function chName(token) {
        let h = 0x811c9dc5;
        for (let i = 0; i < token.length; i++) {
          h ^= token.charCodeAt(i);
          h = Math.imul(h, 0x01000193);
        }
        return "ch-" + (h >>> 0).toString(36).slice(0, 4).padStart(4, "0");
      }

      function removeSource(room) {
        const s = sources.get(room);
        if (!s) return;
        s.removed = true; // stop any pending exp-backoff reconnect (see below)
        clearTimeout(s.reconnectTimer);
        unsubscribeSource(s);
        try {
          s.client?.close?.();
          s.client?.pc?.close?.();
        } catch {}
        sources.delete(room);
      }

      // Exponential-backoff reconnect for an agent-yes share room (the RTCClient
      // wire). codehost rooms already self-heal via room-client.js; the agent-yes
      // viewer was one-shot, so a dropped DataChannel (e.g. the host restarting)
      // left the room dead until a manual reload. Retry with jittered backoff
      // until the room is forgotten.
      const RTC_BACKOFF_MIN = 1000,
        RTC_BACKOFF_MAX = 30000;
      async function connectRtcSource(s) {
        s.reconnecting = true; // block overlapping attempts while this one is in flight
        try {
          // Detach the stale peer's onstate BEFORE closing it — otherwise its own
          // "closed" event schedules another reconnect mid-replace, and that timer
          // fires after we've already recovered, churning a healthy channel forever.
          if (s.client) s.client.onstate = () => {};
          // The delta stream died silently with the old client (RTCClient never
          // fires onError), leaving s.streaming=true and s.unsub set — which would
          // make the reconcile poll skip this source AND block re-subscription.
          // Clear it so the fresh transport below re-establishes the stream.
          unsubscribeSource(s);
          try {
            s.client?.close?.(); // drop the stale peer AND its signaling socket
          } catch {}
          const c = new RTCClient(s.host, s.id, s.token);
          c.onstate = (st) => {
            if (st === "failed" || st === "closed") {
              s.live = false;
              renderRoomsIfOpen();
              scheduleRtcReconnect(s); // "disconnected" is transient; ignore it
            }
          };
          try {
            await c.connect();
          } catch (e) {
            c.close(); // connect() already opened the signaling socket — don't
            throw e; //  leak it on every failed retry of an offline room
          }
          if (s.removed) {
            c.close(); // room was forgotten mid-connect — don't install/leak it
            return;
          }
          s.client = c;
          s.tx = rtcTx(c);
          s.reconnectDelay = RTC_BACKOFF_MIN; // a healthy connect resets the backoff
          clearTimeout(s.reconnectTimer); // cancel any reconnect queued during replace
          s.reconnectTimer = null;
          subscribeSource(s); // re-establish the live delta stream over the new wire
          // agent-yes share (unlike codehost) sends no per-agent device id, so
          // every machine's rows would be unlabelled. Ask the host who it is once
          // and tag this room's agents with it in listSource. Best-effort: an older
          // host with no /api/whoami just leaves rows device-less.
          try {
            s.deviceLabel = (await s.tx.fetchJSON("/api/whoami"))?.host || "";
            // whoami resolves after the first listSource may have already rendered
            // this room's rows device-less (and activity-gated polling might not
            // re-fire soon on a backgrounded tab). Re-render now so the host label
            // lands immediately instead of lagging a poll.
            if (s.deviceLabel) loadList();
          } catch {
            s.deviceLabel = "";
          }
        } finally {
          s.reconnecting = false;
        }
      }
      function scheduleRtcReconnect(s) {
        // forgotten, already queued, or a connect is already in flight
        if (s.removed || s.reconnectTimer || s.reconnecting) return;
        const base = s.reconnectDelay || RTC_BACKOFF_MIN;
        const delay = Math.round(base * (0.75 + Math.random() * 0.5)); // jitter
        s.reconnectDelay = Math.min(base * 2, RTC_BACKOFF_MAX);
        s.reconnectTimer = setTimeout(async () => {
          s.reconnectTimer = null;
          if (s.removed || s.reconnecting) return;
          try {
            await connectRtcSource(s);
            s.live = true;
            renderRoomsIfOpen();
            // Await the refresh: a prior failed poll cleared `entries`, so select()
            // below would find nothing and skip the rebind until the list is back.
            await loadList();
            // A terminal opened before the drop still holds the dead tx (its tail
            // subscription + send closures). Re-select to rebind it to the new
            // transport, else the room looks live but the terminal stays frozen.
            if (sel && sel.startsWith(s.id + "#")) select(sel);
          } catch {
            s.live = false;
            scheduleRtcReconnect(s); // keep trying
          }
        }, delay);
      }

      // Add a room to the fleet and connect it — WITHOUT dropping the others, so
      // every saved room streams its agents at once. Idempotent: a room already
      // in the fleet just refreshes. The connection runs in the background; the
      // next poll picks up its agents once the tunnel is open.
      async function addRoomSource(room, token, host) {
        host = host || SIG_DEFAULT;
        saveRoom(room, token, host); // cache so the badge can list & reconnect later
        if (sources.has(room)) return;
        const s = {
          id: room,
          host,
          kind: host === CH_HOST ? "ch" : "rtc",
          tx: null,
          client: null,
          live: false,
          tried: false,
          devices: new Set(),
          serverCount: 0,
        };
        sources.set(room, s);
        renderRoomsIfOpen();
        try {
          if (host === CH_HOST) {
            const c = new CodehostClient(token);
            c.onstate = (st) => {
              if (st === "closed") {
                s.live = false;
                renderRoomsIfOpen();
              }
            };
            await c.connect();
            s.client = c;
            s.tx = c;
          } else {
            s.token = token;
            await connectRtcSource(s);
          }
          s.live = true;
        } catch (e) {
          s.live = false;
          if (s.kind === "rtc") scheduleRtcReconnect(s);
        }
        s.tried = true;
        renderRoomsIfOpen();
        if (s.live) subscribeSource(s);
        loadList();
      }

      // Connect to every saved room at once (called on boot).
      function connectAllRooms() {
        const r = loadRooms();
        for (const name of Object.keys(r)) addRoomSource(name, r[name].token, r[name].host);
      }

      // Back-compat alias: a freshly pasted/linked room is added like any other.
      const connectRoom = (room, token, host) => addRoomSource(room, token, host);

      function parseRoomInput(s) {
        s = s.trim();
        const hash = s.indexOf("#");
        if (hash >= 0) s = s.slice(hash + 1);
        s = decodeURIComponent(s);
        // codehost rooms: "ch:<room-token>" or a codehost.dev share link ("…#t=<token>").
        if (s.startsWith("ch:") || s.startsWith("t=")) {
          const token = (s.startsWith("ch:") ? s.slice(3) : s.slice(2)).trim();
          return token ? { room: chName(token), token, host: CH_HOST } : null;
        }
        const m = /^([A-Za-z0-9_-]+):([^@\s]+)(?:@(.+))?$/.exec(s);
        return m ? { room: m[1], token: m[2], host: m[3] } : null;
      }

      // Re-render the rooms panel only if it's currently open (so live-count
      // updates from connect/poll land without forcing it open).
      function renderRoomsIfOpen() {
        if ($("rooms").style.display !== "none") renderRooms();
      }

      // A room's live state: a room is reachable whenever we can join its
      // signaling server, so "live" really means "how many serving machines are
      // in it right now". The signaling layer can't tell us the count until we've
      // connected, so we show the source's last-known serverCount.
      function roomStatus(n) {
        const s = sources.get(n);
        if (!s) return `<span class="rstat off">○</span>`;
        if (!s.live) return `<span class="rstat off" title="offline">○</span>`;
        const c = s.serverCount;
        return `<span class="rstat on" title="${c} live ${c === 1 ? "server" : "servers"}">● ${c}</span>`;
      }

      function renderRooms() {
        const r = loadRooms();
        const names = Object.keys(r).sort((a, b) => r[b].ts - r[a].ts);
        const items = names.length
          ? names
              .map(
                (n) => `<div class="ritem ${sources.get(n)?.live ? "cur" : ""}">
          ${roomStatus(n)}
          <span class="rname" data-room="${esc(n)}">${esc(n)}</span>
          <span class="rhost">${esc(r[n].host)}</span>
          <span class="rx" data-del="${esc(n)}" title="forget">✕</span></div>`,
              )
              .join("")
          : `<div class="empty2">no saved rooms — paste a share link below</div>`;
        $("rooms").innerHTML = `<div class="rtitle">rooms · stored on this device</div>${items}
      <div class="radd"><input id="roomin" placeholder="room:token  or  https://…/#room:token" /><button id="roomadd">add</button></div>
      <div class="rconnect">new here? install agent-yes (bun or npm, auto):
        <code id="cmdinstall" class="copy" title="click to copy">curl -fsSL https://agent-yes.com/setup.sh | sh</code>
        <span style="opacity:.6">Windows:</span>
        <code id="cmdinstallwin" class="copy" title="click to copy">powershell -c "irm https://agent-yes.com/setup.ps1 | iex"</code></div>
      <div class="rconnect">share your own fleet — run this, then open the printed link:
        <code id="cmd" class="copy" title="click to copy">ay serve --share</code></div>
      <div class="rconnect">or view a <b>codehost</b> room — paste <code>ch:&lt;room-token&gt;</code> (or a
        codehost.dev share link) above; every machine in the room shows its agents here.</div>`;
      }

      $("conn").addEventListener("click", () => {
        const el = $("rooms");
        if (el.style.display === "none") {
          renderRooms();
          el.style.display = "block";
          $("roomin")?.focus();
        } else el.style.display = "none";
      });
      $("rooms").addEventListener("click", (ev) => {
        const name = ev.target.closest(".rname");
        if (name) {
          // Rooms are all connected at once now; clicking one filters the list to
          // it (and re-adds it if it was forgotten/offline), rather than switching.
          const r = loadRooms()[name.dataset.room];
          if (r) {
            connectRoom(name.dataset.room, r.token, r.host);
            $("q").value = "room:" + name.dataset.room;
            try {
              localStorage.setItem("ay.filter", $("q").value);
            } catch {}
            renderList();
            $("rooms").style.display = "none";
          }
          return;
        }
        const del = ev.target.closest(".rx");
        if (del) {
          removeSource(del.dataset.del);
          dropRoom(del.dataset.del);
          renderRooms();
          loadList();
          return;
        }
        if (ev.target.id === "roomadd") {
          const p = parseRoomInput($("roomin").value);
          if (p) {
            connectRoom(p.room, p.token, p.host);
            $("rooms").style.display = "none";
          } else alert("expected  room:token  or a share link");
        }
      });

      // Click-to-copy for any <code class="copy"> (install one-liners, share cmd…),
      // wherever it lives — header or the rooms panel.
      document.addEventListener("click", (ev) => {
        const c = ev.target.closest && ev.target.closest("code.copy");
        if (!c) return;
        navigator.clipboard?.writeText(c.textContent).then(() => {
          const o = c.textContent;
          c.textContent = "copied ✓";
          setTimeout(() => {
            c.textContent = o;
          }, 1000);
        });
      });

      // ---- launch: command-only URLs (#launch=<json>, NO token) ----
      // The link carries only WHAT to run; the capability to run it is the viewer's
      // own connected fleet (cached room) + a y/N confirm on that host. So a public
      // launch link can never spawn on a machine the clicker doesn't already control.
      function showLaunch(spec) {
        const rooms = loadRooms();
        const names = Object.keys(rooms).sort((a, b) => rooms[b].ts - rooms[a].ts);
        const cmd = "ay " + (spec.cli || "claude") + (spec.prompt ? ` -- "${spec.prompt}"` : "");
        const fleets = names.length
          ? `<div class="lfleets">${names.map((n) => `<button class="lfleet" data-room="${esc(n)}">▷ ${esc(n)}</button>`).join("")}</div>
         <div class="lhint">pick a fleet to run on</div>`
          : `<div class="lwarn">No connected fleet on this device. Run <code>bunx agent-yes serve --share</code>, open its link once, then reopen this launch link.</div>`;
        $("launch").innerHTML = `<div class="lcard">
      <div class="ltitle">Launch agent</div>
      <div class="lcmd">${esc(cmd)}</div>
      <div class="lcwd">cwd: ${esc(spec.cwd || "(host default)")}</div>
      ${fleets}
      <button class="lcancel">cancel</button></div>`;
        $("launch").dataset.spec = JSON.stringify(spec);
        $("launch").style.display = "flex";
      }

      // Pick the fleet to spawn on: an explicit roomId, else the selected agent's
      // source, else local, else any live source.
      function spawnTarget(roomId) {
        return (
          sources.get(roomId) ||
          srcFor(entries.find((e) => e._key === sel)) ||
          sources.get(LOCAL) ||
          [...sources.values()].find((s) => s.live) ||
          [...sources.values()][0] ||
          null
        );
      }

      // Spawn a new agent on the chosen fleet and select it once it registers.
      // Shared by the launch-URL flow and the "+ New agent" button. Returns false
      // on a spawn error (the alert is already shown), true otherwise.
      async function spawnAndSelect(spec, roomId) {
        await loadList();
        const target = spawnTarget(roomId);
        if (!target) {
          alert("no fleet to launch on — connect a room or run `ay serve` locally");
          return false;
        }
        // Match by "newest agent that wasn't here before" ON THIS fleet — the
        // spawn returns the wrapper pid, but the agent registers under its own.
        const before = new Set(entries.filter((e) => e._room === target.id).map((e) => e.pid));
        const res = await target.tx.post("/api/spawn", {
          cli: spec.cli || "claude",
          cwd: spec.cwd || undefined,
          prompt: spec.prompt || undefined,
        });
        if (!res.ok) {
          alert("launch failed: " + res.text);
          return false;
        }
        for (let i = 0; i < 14; i++) {
          await loadList();
          const fresh = entries
            .filter((e) => e._room === target.id && !before.has(e.pid))
            .sort((a, b) => (b.started_at || 0) - (a.started_at || 0));
          if (fresh.length) {
            select(fresh[0]._key);
            return true;
          }
          await new Promise((r) => setTimeout(r, 800));
        }
        return true;
      }

      async function launchOn(room, spec) {
        const r = loadRooms()[room];
        if (!r) return;
        $("launch").style.display = "none";
        await connectRoom(room, r.token, r.host);
        await spawnAndSelect(spec, room);
      }

      $("launch").addEventListener("click", (ev) => {
        const f = ev.target.closest(".lfleet");
        if (f) {
          launchOn(f.dataset.room, JSON.parse($("launch").dataset.spec));
          return;
        }
        if (ev.target.closest(".lcancel")) $("launch").style.display = "none";
      });

      // ---- "+ New agent": a spawn form for the CURRENTLY connected fleet ----
      // Click → fill (cli defaults to claude, cwd prefilled from the selected agent
      // when there is one, prompt optional) → POST /api/spawn on this connection.
      // Always allowed: the console already controls every running agent's stdin.
      function showNew() {
        const here = entries.find((x) => x._key === sel);
        const cwd = here?.cwd || "";
