<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>agent-yes UI test</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: #1e1e2e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 16px;
        font-family: monospace;
      }
      h2 {
        color: #cdd6f4;
        margin-bottom: 12px;
        font-size: 14px;
        letter-spacing: 0.05em;
      }
      #status {
        color: #a6e3a1;
        font-size: 12px;
        margin-bottom: 8px;
      }
      #terminal-container {
        border: 1px solid #45475a;
        border-radius: 6px;
        overflow: hidden;
        width: fit-content;
      }
    </style>
    <!-- JetBrains Mono served locally (must be installed on the OS, or served by test server) -->
    <style>
      @font-face {
        font-family: "JetBrains Mono";
        src: url("/font/JetBrainsMono-Regular.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
      }
    </style>
    <!-- xterm.js from CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-canvas@0.7.0/lib/xterm-addon-canvas.min.js"></script>
  </head>
  <body>
    <h2>agent-yes PTY output — xterm.js render test</h2>
    <div id="status">Connecting...</div>
    <div id="terminal-container"></div>

    <script>
      const COLS = parseInt(new URLSearchParams(location.search).get("cols") || "120");
      const ROWS = parseInt(new URLSearchParams(location.search).get("rows") || "30");

      const term = new Terminal({
        cols: COLS,
        rows: ROWS,
        theme: {
          background: "#1e1e2e",
          foreground: "#cdd6f4",
          black: "#45475a",
          red: "#f38ba8",
          green: "#a6e3a1",
          yellow: "#f9e2af",
          blue: "#89b4fa",
          magenta: "#f5c2e7",
          cyan: "#89dceb",
          white: "#bac2de",
          brightBlack: "#585b70",
          brightRed: "#f38ba8",
          brightGreen: "#a6e3a1",
          brightYellow: "#f9e2af",
          brightBlue: "#89b4fa",
          brightMagenta: "#f5c2e7",
          brightCyan: "#89dceb",
          brightWhite: "#a6adc8",
          cursor: "#f5e0dc",
        },
        fontFamily:
          '"JetBrains Mono", "DejaVu Sans Mono", "Liberation Mono", "Courier New", monospace',
        fontSize: 14,
        lineHeight: 1.1,
        cursorBlink: true,
        scrollback: 1000,
        allowTransparency: false,
        convertEol: false,
      });

      const fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.loadAddon(new WebLinksAddon.WebLinksAddon());
      // Canvas renderer gives pixel-perfect box-drawing and block chars
      if (typeof CanvasAddon !== "undefined") {
        try {
          term.loadAddon(new CanvasAddon.CanvasAddon());
        } catch {}
      }

      term.open(document.getElementById("terminal-container"));
      // Don't call fitAddon.fit() — we want to keep the fixed COLS×ROWS
      // so screenshots are reproducible.

      const wsUrl = `ws://${location.host}/ws?cols=${COLS}&rows=${ROWS}`;
      const ws = new WebSocket(wsUrl);

      const status = document.getElementById("status");

      ws.onopen = () => {
        status.textContent = `Connected — ${COLS}×${ROWS}`;
        status.style.color = "#a6e3a1";
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === "output") {
          // Decode base64 → Uint8Array → xterm (preserves UTF-8 multi-byte sequences)
          const bytes = Uint8Array.from(atob(msg.data), (c) => c.charCodeAt(0));
          term.write(bytes);
        } else if (msg.type === "exit") {
          status.textContent = `Process exited (code ${msg.code})`;
          status.style.color = "#f9e2af";
        }
      };

      ws.onerror = () => {
        status.textContent = "WebSocket error";
        status.style.color = "#f38ba8";
      };

      ws.onclose = () => {
        if (status.textContent === "Connected") {
          status.textContent = "Disconnected";
          status.style.color = "#45475a";
        }
      };

      // Forward keyboard input to PTY
      term.onData((data) => {
        ws.send(JSON.stringify({ type: "input", data }));
      });

      // Expose terminal for Playwright inspection
      window._term = term;
      window._termReady = false;
      term.onWriteParsed(() => {
        window._termReady = true;
      });
    </script>
  </body>
</html>
